<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EMVE School App</title>
<style>
:root{
  --s:#C8500A;--s2:#E87030;--d:#1A1C2E;--d2:#262840;
  --g:#1A6E3C;--g2:#23A058;--r:#B02020;--b:#1A4A98;
  --gold:#B8860A;--pur:#5A2898;--bg:#F3EDE4;--card:#FFF;
  --bdr:#DDD5C5;--mt:#786858;
  --sh:0 2px 16px rgba(0,0,0,.07);--shl:0 8px 36px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Kohinoor Devanagari','Noto Sans Devanagari',Arial,sans-serif;background:var(--bg);color:var(--d);min-height:100vh;font-size:14px;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--d) 0%,var(--d2) 50%,#30186A 100%);padding:14px;}
.lbox{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:390px;box-shadow:var(--shl);}
.lemb{width:62px;height:62px;background:linear-gradient(135deg,var(--s),var(--s2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px;}
.lschool{font-size:1rem;font-weight:700;color:var(--d);}
.lsub{font-size:.7rem;color:var(--mt);}
.llib{font-size:.78rem;font-weight:700;color:var(--s);background:#FFF3E8;padding:4px 10px;border-radius:7px;border-left:3px solid var(--s);display:inline-block;margin-top:6px;}
.lf label{display:block;font-size:.69rem;font-weight:700;color:var(--mt);margin-bottom:3px;text-transform:uppercase;margin-top:10px;}
.lf select,.lf input{width:100%;padding:9px 11px;border:1.5px solid var(--bdr);border-radius:8px;font-family:inherit;font-size:.88rem;background:#fff;}
.lf select:focus,.lf input:focus{outline:none;border-color:var(--s);}
.lbtn{width:100%;padding:11px;background:linear-gradient(135deg,var(--s),var(--s2));color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.94rem;font-weight:700;cursor:pointer;margin-top:13px;}
.ltog{display:flex;gap:7px;justify-content:flex-end;margin-bottom:12px;}
.ltbtn{padding:4px 11px;border:1.5px solid var(--bdr);border-radius:20px;background:#fff;font-family:inherit;font-size:.74rem;cursor:pointer;color:var(--mt);}
.ltbtn.on{background:var(--s);color:#fff;border-color:var(--s);}
#app{display:none;}
header{background:var(--d);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hi{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;max-width:1400px;margin:0 auto;gap:7px;}
.hl{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.hico{width:34px;height:34px;background:linear-gradient(135deg,var(--s),var(--s2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hinfo{min-width:0;}
.htop{font-size:.53rem;opacity:.5;}
.hmain{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:.56rem;opacity:.55;}
.hr{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ubdg{background:rgba(255,255,255,.11);border-radius:18px;padding:3px 9px;font-size:.7rem;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.rchip{font-size:.61rem;padding:2px 6px;border-radius:7px;font-weight:700;}
.rs{background:#FEF3E2;color:var(--gold);}
.rm{background:#E6F5EC;color:var(--g);}
.rt{background:#EBF4FF;color:var(--b);}
.sbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:4px 9px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.69rem;}
#sync{font-size:.65rem;color:#23A058;}
.modules{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:500px;margin:22px auto;padding:0 13px;}
.mcard{background:#fff;border-radius:14px;padding:22px 14px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:all .2s;border-top:4px solid var(--s);}
.mcard:hover{transform:translateY(-3px);box-shadow:var(--shl);}
.mcard.lib{border-top-color:var(--b);}
.mcard.res{border-top-color:var(--g);}
.micon{font-size:2rem;margin-bottom:9px;}
.mtit{font-size:.96rem;font-weight:700;color:var(--d);}
.mdesc{font-size:.71rem;color:var(--mt);margin-top:3px;}
nav{background:#fff;border-bottom:2px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.ni{display:flex;max-width:1400px;margin:0 auto;padding:0 3px;}
.tab{padding:9px 11px;cursor:pointer;white-space:nowrap;font-size:.74rem;font-weight:600;color:var(--mt);border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:3px;}
.tab:hover{color:var(--s);}
.tab.on{color:var(--s);border-bottom-color:var(--s);}
main{max-width:1400px;margin:0 auto;padding:13px 11px;}
.card{background:var(--card);border-radius:12px;padding:15px;box-shadow:var(--sh);margin-bottom:13px;}
.ct{font-size:.84rem;font-weight:700;color:var(--d);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ctag{font-size:.61rem;background:var(--bg);color:var(--mt);padding:2px 6px;border-radius:6px;}
.bbtn{margin-bottom:11px;padding:6px 12px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:7px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:13px;}
.sc{background:#fff;border-radius:10px;padding:11px 9px;box-shadow:var(--sh);text-align:center;border-top:4px solid var(--s);}
.sc.g{border-top-color:var(--g);}
.sc.r{border-top-color:var(--r);}
.sc.b{border-top-color:var(--b);}
.sc.p{border-top-color:var(--pur);}
.sc.gold{border-top-color:var(--gold);}
.sn{font-size:1.5rem;font-weight:700;color:var(--d);}
.sl{font-size:.64rem;color:var(--mt);margin-top:2px;}
.fg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:9px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:var(--mt);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-family:inherit;font-size:.82rem;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--s);}
.btn{padding:7px 13px;border:none;border-radius:7px;font-family:inherit;font-size:.79rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.bp{background:var(--s);color:#fff;}
.bs{background:var(--g);color:#fff;}
.bd{background:var(--r);color:#fff;}
.bb{background:var(--b);color:#fff;}
.bo{background:#fff;color:var(--s);border:1.5px solid var(--s);}
.bsm{padding:4px 9px;font-size:.7rem;}
.bgold{background:var(--gold);color:#fff;}
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg);padding:7px 8px;text-align:left;font-size:.66rem;font-weight:700;color:var(--mt);text-transform:uppercase;white-space:nowrap;}
td{padding:7px 8px;border-bottom:1px solid var(--bdr);font-size:.78rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FDFAF5;}
.bdg{display:inline-flex;align-items:center;padding:2px 6px;border-radius:18px;font-size:.65rem;font-weight:700;white-space:nowrap;}
.bgg{background:#E6F5EC;color:var(--g);}
.bgr{background:#FDECEA;color:var(--r);}
.bgy{background:#FEF3E2;color:var(--gold);}
.bgb{background:#EBF4FF;color:var(--b);}
.bgp{background:#F0EAFA;color:var(--pur);}
.sb{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.sb input,.sb select{padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-family:inherit;font-size:.8rem;background:#fff;}
.sb input{flex:1;min-width:120px;}
.alert{border-radius:9px;padding:9px 12px;margin-bottom:11px;display:flex;align-items:flex-start;gap:7px;font-size:.78rem;}
.aw{background:#FFF3F0;border:1.5px solid #FFCAB8;}
.ai{background:#EBF4FF;border:1.5px solid #BDD9FF;}
.ag{background:#E6F5EC;border:1.5px solid #A8DDB9;}
.pbar{background:#E5E7EB;border-radius:20px;height:9px;overflow:hidden;min-width:60px;}
.pfill{height:100%;border-radius:20px;transition:width 1s ease;}
.mi{width:52px;padding:3px 4px;border:1.5px solid var(--bdr);border-radius:5px;font-family:inherit;font-size:.76rem;text-align:center;background:#FFFDE7;}
.mi:focus{outline:none;border-color:var(--s);}
.mi.err{border-color:var(--r);background:#FFF0F0;}
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg);border-radius:8px;margin-bottom:8px;}
.tsw{position:relative;width:44px;height:22px;flex-shrink:0;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s;}
.tsl:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.tsl{background:var(--g);}
input:checked+.tsl:before{transform:translateX(22px);}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:none;align-items:center;justify-content:center;padding:13px;}
.mov.op{display:flex;}
.mbox{background:#fff;border-radius:15px;padding:20px;max-width:460px;width:100%;box-shadow:var(--shl);max-height:90vh;overflow-y:auto;}
.mbox h3{font-size:.93rem;margin-bottom:10px;color:var(--d);}
.mfoot{display:flex;gap:7px;justify-content:flex-end;margin-top:11px;}
#toast{position:fixed;bottom:16px;right:14px;background:var(--d);color:#fff;padding:9px 14px;border-radius:9px;font-size:.78rem;box-shadow:var(--shl);transform:translateY(70px);opacity:0;transition:all .3s;z-index:999;max-width:250px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{background:var(--g);}
#toast.err{background:var(--r);}
.dhero{background:linear-gradient(135deg,var(--d) 0%,var(--d2) 50%,#2A1060 100%);border-radius:14px;padding:22px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;}
.dh-bg{position:absolute;right:-15px;top:-15px;font-size:120px;opacity:.06;}
.dh-rel{position:relative;z-index:1;}
.dhstats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:16px;}
.dhs{background:rgba(255,255,255,.11);border-radius:9px;padding:11px;text-align:center;}
.dhs-n{font-size:1.5rem;font-weight:700;}
.dhs-l{font-size:.64rem;opacity:.7;margin-top:2px;}
.pcard-wrap{border:2px solid #000;font-family:Arial,sans-serif;font-size:.82rem;line-height:1.5;}
.pcard-top{text-align:center;border-bottom:2px solid #000;padding:10px;}
.pcard-school{font-size:1.05rem;font-weight:900;}
.pcard-title{font-size:1.2rem;font-weight:700;margin:5px 0;}
.pcard-info{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:8px;border-bottom:1px solid #000;font-size:.76rem;}
.pcard-row{display:flex;gap:4px;padding:1px 0;border-bottom:1px dotted #ddd;}
.pcard-marks{width:100%;border-collapse:collapse;margin-top:8px;font-size:.74rem;}
.pcard-marks th,.pcard-marks td{border:1px solid #000;padding:4px 5px;text-align:center;}
.pcard-marks th{background:#F0F0F0;font-size:.68rem;}
.pcard-grade-tbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:.7rem;}
.pcard-grade-tbl th,.pcard-grade-tbl td{border:1px solid #000;padding:3px 5px;text-align:center;}
.pcard-rules{font-size:.68rem;line-height:1.5;padding:6px;border-top:1px solid #000;margin-top:6px;}
.pcard-signs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;border-top:1px solid #000;font-size:.72rem;text-align:center;margin-top:4px;}
/* Gosawara */
.gos-tbl{width:100%;border-collapse:collapse;font-size:.72rem;}
.gos-tbl th,.gos-tbl td{border:1px solid #999;padding:4px 6px;text-align:center;}
.gos-tbl th{background:var(--d);color:#fff;}
@media(max-width:600px){.hi{padding:7px 10px;}.hmain{font-size:.78rem;}main{padding:10px 8px;}.modules{max-width:100%;}.dhstats{grid-template-columns:repeat(2,1fr);}.fg2{grid-template-columns:1fr;}}
@media(min-width:1024px){.sg{grid-template-columns:repeat(6,1fr);}}
@media print{header,nav,.btn,.bbtn,#toast,.sbtn,.no-print{display:none!important;}body{background:#fff;}.pcard-wrap{box-shadow:none!important;}main{padding:0!important;}.card{box-shadow:none;border:1px solid #ddd;}}
</style>
</head>

<div id="home-view" style="display:none;">

</div>

<div id="mod-view" style="display:none;">

</div>

<div id="toast"></div>

</div>

function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function dL(due){var d=new Date(due.split('T')[0]),n=new Date(today());return Math.floor((n-d)/86400000);}

// FIX: handles ISO dates like "2026-04-19T18:30:00.000Z"
function fmt(d){
  if(!d||d===''||d===null)return'-';
  try{
    var s=String(d).split('T')[0]; // strip time component
    var p=s.split('-');
    if(p.length===3&&p[0].length===4)return p[2]+'/'+p[1]+'/'+p[0];
  }catch(e){}
  return String(d);
}

function avail(bId){
  var i=transactions.filter(function(t){return t.bId===bId&&!t.retDate;}).length;
  var b=books.find(function(x){return x.id===bId;});
  return b?b.copies-i:0;
}

// 5-8वी श्रेणी
function grade58(pct){
  if(pct>=91)return'अ-1';if(pct>=81)return'अ-2';if(pct>=71)return'ब-1';
  if(pct>=61)return'ब-2';if(pct>=51)return'क-1';if(pct>=41)return'क-2';
  if(pct>=33)return'ड';  if(pct>=21)return'इ-1';return'इ-2';
}
// 9-10वी grade
function grade910(pct){
  if(pct>=75)return'A';if(pct>=60)return'B';if(pct>=35)return'C';return'D';
}
function grade(pct,clsId){
  var type=getCtype(clsId||'8');
  return type==='high'?grade910(pct):grade58(pct);
}

function getCls(id){return CLASSES.find(function(c){return c.id===id;});}
function getCtype(id){var c=getCls(id);return c?c.type:'mid';}
function getSubjs(clsId){return SUBJS[getCtype(clsId)]||SUBJS.mid;}
function getExams(clsId){return EXAM_STRUCT[getCtype(clsId)]||EXAM_STRUCT.mid;}
function getMaxTotal(clsId){return getExams(clsId).reduce(function(s,e){return s+e.max;},0)*getSubjs(clsId).length;}
function getStds(clsId){
  return students.filter(function(s){return s.cls===clsId&&s.status!=='removed';})
                 .sort(function(a,b){return parseInt(a.roll||0)-parseInt(b.roll||0);});
}

function getMk(sId,cls,subj,exam){
  var k=cls+'|'+subj+'|'+exam;
  var d=marksData[k];if(!d)return'';
  var e=d.find(function(x){return x.sId===sId;});
  return e?e.m:'';
}
function setMk(sId,cls,subj,exam,val){
  var k=cls+'|'+subj+'|'+exam;
  if(!marksData[k])marksData[k]=[];
  var idx=-1;
  for(var i=0;i<marksData[k].length;i++){if(marksData[k][i].sId===sId){idx=i;break;}}
  if(idx>=0)marksData[k][idx].m=val;
  else marksData[k].push({sId:sId,m:val});
}

function calcStudentTotal(sId,clsId){
  var subjs=getSubjs(clsId);
  var exams=getExams(clsId);
  var total=0;var maxT=0;var hasAny=false;
  subjs.forEach(function(subj){
    exams.forEach(function(exam){
      var v=getMk(sId,clsId,subj,exam.key);
      if(v!==''){hasAny=true;total+=parseFloat(v)||0;}
      maxT+=exam.max;
    });
  });
  if(!hasAny)return{total:0,max:maxT,pct:0,hasData:false};
  return{total:Math.round(total*10)/10,max:maxT,pct:maxT>0?Math.round(total/maxT*100):0,hasData:true};
}

function calcSubjTotal(sId,cls,subj){
  var exams=getExams(cls);
  var total=0;var max=0;var hasAny=false;
  exams.forEach(function(e){
    var v=getMk(sId,cls,subj,e.key);
    if(v!==''){hasAny=true;total+=parseFloat(v)||0;}
    max+=e.max;
  });
  if(!hasAny)return{total:'',max:max,pct:0};
  return{total:Math.round(total*10)/10,max:max,pct:max>0?Math.round(total/max*100):0};
}

function buildLibReport(){
  var el=document.getElementById('lrp-content');if(!el)return;
  var tcStats=TEACHERS.filter(function(t){return !t.isMukh;}).map(function(tc){
    var given=transactions.filter(function(tx){return tx.tId===tc.id;}).length;
    var ret2=transactions.filter(function(tx){return tx.tId===tc.id&&tx.retDate;}).length;
    var seen={};transactions.filter(function(tx){return tx.tId===tc.id;}).forEach(function(tx){seen[tx.sName]=1;});
    var stds=Object.keys(seen).length;
    return{name:tc.name,given:given,ret:ret2,stds:stds};
  }).sort(function(a,b){return b.given-a.given;});
  var maxG=Math.max.apply(null,[1].concat(tcStats.map(function(t){return t.given;})));
  var tcRows=tcStats.map(function(tc){
    var pct=Math.round(tc.given/maxG*100);
    return '<tr><td><strong>'+tc.name+'</strong></td><td>'+tc.given+'</td><td>'+tc.ret+'</td><td>'+tc.stds+'</td><td><div class="pbar"><div class="pfill" style="width:'+pct+'%;background:var(--s);"></div></div></td></tr>';
  }).join('');
  var clsRows=CLASSES.map(function(c){
    var stds2=getStds(c.id);
    var readers=stds2.filter(function(s){return transactions.some(function(t){return t.sId===s.id&&t.retDate;});});
    var nonR=stds2.filter(function(s){return !transactions.some(function(t){return t.sId===s.id;});});
    return '<tr><td><strong>'+c.label+'</strong></td><td>'+stds2.length+'</td><td><span class="bdg bgg">'+readers.length+'</span></td><td><span class="bdg bgr">'+nonR.length+'</span></td></tr>';
  }).join('');
  el.innerHTML=
    '<div class="card"><div class="ct">👨‍🏫 शिक्षक प्रेरणा अहवाल</div>'+
    '<div class="tw"><table><thead><tr><th>शिक्षक</th><th>पुस्तके</th><th>परत</th><th>विद्यार्थी</th><th>प्रगती</th></tr></thead><tbody>'+tcRows+'</tbody></table></div></div>'+
    '<div class="card"><div class="ct">🏫 वर्गनिहाय वाचन अहवाल</div>'+
    '<div class="tw"><table><thead><tr><th>वर्ग</th><th>एकूण</th><th>वाचक</th><th>वाचन नाही</th></tr></thead><tbody>'+clsRows+'</tbody></table></div></div>';

function buildResDash(){
  var el=document.getElementById('rd-content');if(!el)return;
  var isA=(curRole==='super'||curRole==='mukh');
  if(isA){
    var tcCards=TEACHERS.filter(function(t){return !t.isMukh;}).map(function(tc){
      var done=0;var exp=0;
      tc.classes.forEach(function(cls){
        var stds2=getStds(cls);
        var subjs2=getSubjs(cls).filter(function(s){return tc.subjects.indexOf(s)>=0;});
        var exs=getExams(cls);
        exp+=stds2.length*subjs2.length*exs.length;
        subjs2.forEach(function(subj){exs.forEach(function(ex){var k=cls+'|'+subj+'|'+ex.key;if(marksData[k])done+=marksData[k].filter(function(e){return e.m!=='';}).length;});});
      });
      var pct=exp>0?Math.round(done/exp*100):0;
      var color=pct>=80?'var(--g)':pct>=50?'var(--gold)':'var(--r)';
      return '<div style="background:white;border-radius:10px;padding:12px;margin-bottom:8px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+

      subjs2.forEach(function(subj){exs.forEach(function(ex){var k=cls+'|'+subj+'|'+ex.key;if(marksData[k])myDone+=marksData[k].filter(function(e){return e.m!=='';}).length;});});
    });
    var myPct=myExp>0?Math.round(myDone/myExp*100):0;
    var myColor=myPct>=80?'var(--g)':myPct>=50?'var(--gold)':'var(--r)';
    el.innerHTML=
      '<div class="sg">'+

      '<div class="sc"><div class="sn">'+curTc.classes.length+'</div><div class="sl">वर्ग</div></div>'+

  }
}

// Update row total live as user types
function updateRowTotal(sId,cls,subj){

function saveAllMk(cls,subj){

function loadGosawara(){
  var cls=(document.getElementById('gos-cls')||{}).value||'';
  var wrap=document.getElementById('gos-wrap');if(!wrap)return;
  if(!cls){wrap.innerHTML='';return;}
  var stds2=getStds(cls);

    wrap.innerHTML='<div class="alert aw"><div>⚠️</div><div>विद्यार्थी नाहीत. शीट मधून डेटा लोड झाला आहे का?</div></div>';
    return;
  }
  var subjs=getSubjs(cls);
  var isHigh=getCtype(cls)==='high';
  var passed=stds2.filter(function(s){var r=calcStudentTotal(s.id,cls);return r.hasData&&r.pct>=33;}).length;
  var failed=stds2.filter(function(s){var r=calcStudentTotal(s.id,cls);return r.hasData&&r.pct<33;}).length;
  var noData=stds2.filter(function(s){return !calcStudentTotal(s.id,cls).hasData;}).length;
  var stats='<div class="sg" style="margin:10px 0;">'+
    '<div class="sc b"><div class="sn">'+stds2.length+'</div><div class="sl">एकूण पट</div></div>'+

    '<div class="sc r"><div class="sn">'+failed+'</div><div class="sl">अनुत्तीर्ण</div></div>'+
    '<div class="sc gold"><div class="sn">'+noData+'</div><div class="sl">गुण नाहीत</div></div>'+
    '</div>';
  var table='';
  if(isHigh){
    // 9-10वी: percentage slab × subject (Excel style)
    var slabs=[
      {l:'90% - 100%',mn:90,mx:100},{l:'80% - 89%',mn:80,mx:89},
      {l:'70% - 79%',mn:70,mx:79},{l:'60% - 69%',mn:60,mx:69},
      {l:'50% - 59%',mn:50,mx:59},{l:'35% - 49%',mn:35,mx:49},
      {l:'0% - 34%',mn:0,mx:34}
    ];
    var thS=subjs.map(function(s){return '<th style="text-align:center;font-size:.63rem;">'+s+'</th>';}).join('');
    var rows=slabs.map(function(sl){
      var cells=subjs.map(function(subj){
        var cnt=stds2.filter(function(s){
          var t=calcSubjTotal(s.id,cls,subj);
          return t.total!==''&&t.pct>=sl.mn&&t.pct<=sl.mx;
        }).length;
        return '<td style="text-align:center;">'+(cnt||'-')+'</td>';
      }).join('');
      var tot=stds2.filter(function(s){
        var r=calcStudentTotal(s.id,cls);
        return r.hasData&&r.pct>=sl.mn&&r.pct<=sl.mx;
      }).length;
      return '<tr><td style="font-weight:600;font-size:.74rem;">'+sl.l+'</td>'+cells+'<td style="text-align:center;font-weight:700;background:#f9f9f9;">'+(tot||'-')+'</td></tr>';
    }).join('');
    var avgRow=subjs.map(function(subj){
      var vals=stds2.map(function(s){var t=calcSubjTotal(s.id,cls,subj);return t.total!==''?t.pct:null;}).filter(function(v){return v!==null;});
      var avg=vals.length?Math.round(vals.reduce(function(a,b){return a+b;},0)/vals.length):0;
      return '<td style="text-align:center;font-weight:700;color:var(--b);">'+avg+'%</td>';
    }).join('');
    table='<div class="tw"><table class="gos-tbl"><thead>'+
      '<tr style="background:var(--d);color:white;"><th>शेकडेवारी</th>'+thS+'<th>एकूण</th></tr></thead><tbody>'+
      rows+'<tr style="background:#EBF4FF;"><td style="font-weight:700;">सरासरी %</td>'+avgRow+'<td>-</td></tr>'+
      '</tbody></table></div>';
  }else{
    // 5-8वी: subject × श्रेणी (Excel style)
    var grades=['अ-1','अ-2','ब-1','ब-2','क-1','क-2','ड','इ-1','इ-2'];
    var gFn=[function(p){return p>=91;},function(p){return p>=81&&p<91;},function(p){return p>=71&&p<81;},
             function(p){return p>=61&&p<71;},function(p){return p>=51&&p<61;},function(p){return p>=41&&p<51;},
             function(p){return p>=33&&p<41;},function(p){return p>=21&&p<33;},function(p){return p<21;}];
    var thG='<th style="text-align:center;font-size:.63rem;">'+grades.join('</th><th style="text-align:center;font-size:.63rem;">')+'</th>';
    var rows2=subjs.map(function(subj){
      var cells2=grades.map(function(g,i){
        var cnt=stds2.filter(function(s){
          var t=calcSubjTotal(s.id,cls,subj);
          return t.total!==''&&gFn[i](t.pct);
        }).length;
        return '<td style="text-align:center;">'+(cnt||'-')+'</td>';
      }).join('');
      var tot=stds2.filter(function(s){return calcSubjTotal(s.id,cls,subj).total!=='';}).length;

function sheetPost(name,rows,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SURL,true);
  xhr.setRequestHeader('Content-Type','text/plain');
  xhr.onreadystatechange=function(){if(xhr.readyState===4&&cb)cb();};
  xhr.onerror=function(){syncStatus('err');};
  xhr.send(JSON.stringify({action:'write',sheet:name,rows:rows}));
}
function sheetGet(name,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SURL+'?sheet='+encodeURIComponent(name),true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){
      try{cb(JSON.parse(xhr.responseText).rows||[]);}catch(e){cb([]);}
    }
  };
  xhr.onerror=function(){cb([]);};
  xhr.send();
}

function syncMks(cls,subj){
  syncStatus('ing');

  getStds(cls).forEach(function(s){

// FIX: robust class parsing — handles '8वी','8 वी','इयत्ता 8' etc.
function parseClass(raw){
  if(!raw)return'';
  var orig=String(raw).trim();
  // Strip prefixes/suffixes
  function parseClass(raw){   if(!raw)return'';   var s=String(raw).trim()     .replace(/इयत्ता\s*/g,'')     .replace(/\s*वी\s*$/,'')     .replace(/\s*vi\s*$/i,'')     .replace(/\s+/g,'')     .toLowerCase();   if(s==='10')return'10';   if(s==='9')return'9';   if(s==='8')return'8';   if(s[0]==='7')return(raw.indexOf('अ')>=0||s.indexOf('a')>=0)?'7a':'7b';   if(s[0]==='6')return(raw.indexOf('अ')>=0||s.indexOf('a')>=0)?'6a':'6b';   if(s[0]==='5')return(raw.indexOf('अ')>=0||s.indexOf('a')>=0)?'5a':'5b';   return s; }(/इयत्ता\s*/g,'')
            .replace(/std\.?\s*/gi,'').replace(/class\s*/gi,'')
            .replace(/वी\s*$/,'').replace(/th$/i,'')
            .replace(/nd$/i,'').replace(/rd$/i,'').replace(/st$/i,'')
            .trim().toLowerCase();
  function parseClass(raw){   if(!raw)return'';   var orig=String(raw).trim();   // "10 वी" → "10", "9 वी" → "9" etc.   var s=orig.replace(/\s*वी\s*$/,'')             .replace(/इयत्ता\s*/g,'')             .replace(/\s+/g,'')             .trim().toLowerCase();   if(s==='10')return'10';   if(s==='9')return'9';   if(s==='8')return'8';   if(s.indexOf('7')===0){     return (orig.indexOf('अ')>=0||s.indexOf('a')>=0)?'7a':'7b';   }   if(s.indexOf('6')===0){     return (orig.indexOf('अ')>=0||s.indexOf('a')>=0)?'6a':'6b';   }   if(s.indexOf('5')===0){     return (orig.indexOf('अ')>=0||s.indexOf('a')>=0)?'5a':'5b';   }   return s; }
  if(s==='9')return'9';
  if(s==='8')return'8';
  if(s.indexOf('7')===0){
    if(s.indexOf('a')>=0||orig.indexOf('अ')>=0)return'7a';
    if(s.indexOf('b')>=0||orig.indexOf('ब')>=0)return'7b';
    return'7b';
  }
  if(s.indexOf('6')===0){
    if(s.indexOf('a')>=0||orig.indexOf('अ')>=0)return'6a';
    if(s.indexOf('b')>=0||orig.indexOf('ब')>=0)return'6b';
    return'6b';
  }
  if(s.indexOf('5')===0){
    if(s.indexOf('a')>=0||orig.indexOf('अ')>=0)return'5a';
    if(s.indexOf('b')>=0||orig.indexOf('ब')>=0)return'5b';
    return'5b';
  }
  return s;
}

      });
      nextBId=books.length?Math.max.apply(null,books.map(function(b){return b.id;}))+1:1;
    }
    // Load students — try 'Students' tab first (Kishor's format), fallback to 'vidyarthi'
    sheetGet('Students',function(sR){
      if(sR.length>1){
        parseAndLoadStudents(sR);
        loadTransactionsAndSettings();
      }else{
        sheetGet('vidyarthi',function(sR2){
          parseAndLoadStudents(sR2);
          loadTransactionsAndSettings();
        });
      }
    });
  });
}

function parseAndLoadStudents(sR){
  if(sR.length<2)return;
  var header=sR[0].map(function(h){return String(h||'').trim();});
  // Kishor format: इयत्ता | ह.क्र. | विद्यार्थाचे नाव | आईचे नाव | माध्यम | जन्म तारीख | नोंदणी क्रमांक
  var isKishor=header[0]&&(header[0].indexOf('इयत्ता')>=0||header[0]==='इयत्ता');
  var idC=1;
  if(isKishor){
    students=sR.slice(1).filter(function(r){return r[0]||r[2];}).map(function(r){
      return{
        id:idC++,
        name:String(r[2]||'').trim(),
        cls:parseClass(r[0]),
        roll:String(r[1]||'').trim(),
        status:'active',reason:'',
        mother:String(r[3]||''),
        medium:String(r[4]||''),
        dob:String(r[5]||''),
        regNo:String(r[6]||''),
        father:'',phone:''
      };
    });
  }else{
    // Standard format: ID|Name|Class|Roll|Status|Reason|Father|Mother|DOB|Phone|RegNo
    students=sR.slice(1).filter(function(r){return r[0];}).map(function(r){
      return{
        id:parseInt(r[0])||idC++,
        name:String(r[1]||''),
        cls:parseClass(r[2]),
        roll:String(r[3]||''),
        status:String(r[4]||'active'),
        reason:String(r[5]||''),
        father:String(r[6]||''),
        mother:String(r[7]||''),
        dob:String(r[8]||''),
        phone:String(r[9]||''),
        regNo:String(r[10]||'')
      };
    });
  }
  nextSId=students.length+1;
}

function loadTransactionsAndSettings(){
  sheetGet('vyavhar',function(tR){
    if(tR.length>1){
      transactions=tR.slice(1).filter(function(r){return r[0];}).map(function(r){
        // FIX: use fmt-safe date parsing — strip ISO timezone artifacts
        var iDate=String(r[5]||'').split('T')[0];
        var rDate=r[6]?String(r[6]).split('T')[0]:null;
        var due=String(r[7]||'').split('T')[0];
        return{
          id:parseInt(r[0])||1,sId:null,sName:String(r[1]||''),cls:String(r[2]||''),
          bId:null,bTitle:String(r[3]||''),subj:String(r[4]||''),
          issueDate:iDate,retDate:rDate||null,due:due,
          tId:parseInt(r[8])||null,tName:r[9]||null,retTName:r[10]||null
        };
      });
      nextTxId=transactions.length?Math.max.apply(null,transactions.map(function(t){return t.id;}))+1:1;
    }
    sheetGet('passwords',function(pwR){
      if(pwR.length>1){pwR.slice(1).forEach(function(r){if(r[0]&&r[1])PW[String(r[0])]=String(r[1]);});}
      sheetGet('settings',function(sr){
        if(sr.length>1){sr.slice(1).forEach(function(r){if(r[0]==='marksLocked')settings.marksLocked=(r[1]==='1');});}
        syncStatus('ok');
        toast('डेटा लोड झाला! ✅ ('+students.length+' विद्यार्थी)');
      });
    });
  });
}

function parseShikshakRows(rows){
  if(rows.length<2)return;
  var loaded=rows.slice(1).filter(function(r){return r[0];}).map(function(r){
    var subjs=String(r[4]||'').split('|').map(function(s){return s.trim();}).filter(Boolean);
    var cls=String(r[5]||'').split('|').map(function(c){return c.trim().toLowerCase();}).filter(Boolean);
    var classOf=String(r[3]||'').trim();
    return{
      id:parseInt(r[0])||0,name:String(r[1]||''),pw:String(r[2]||''),
      classOf:classOf,subjects:subjs,classes:cls,
      isMukh:(classOf===''&&subjs.length===0&&cls.length===0)
    };
  });
  if(loaded.length>0){TEACHERS=loaded;}
}

function loadShikshakFirst(){
  sheetGet('Shikshak',function(rows){
    parseShikshakRows(rows);
    // Also update login teacher dropdown if visible
    if(document.getElementById('tc-sel')&&document.getElementById('tc-sel').style.display!=='none'){
      onRole();
    }
    loadAll();
  });
}

// ============================================================
// GLOBAL EVENT DELEGATION — single handler for ALL events
// ============================================================
document.addEventListener('DOMContentLoaded',function(){

  // LOGIN
  document.getElementById('login-btn').addEventListener('click',doLogin);
  document.getElementById('l-pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('logout-btn').addEventListener('click',doLogout);
  document.getElementById('back-btn').addEventListener('click',function(){curMod=null;showHome();});
  document.getElementById('cm-cancel').addEventListener('click',function(){closeM('cm');});
  document.getElementById('mod-lib').addEventListener('click',function(){openMod('lib');});
  document.getElementById('mod-res').addEventListener('click',function(){openMod('res');});
  document.getElementById('btn-mr').addEventListener('click',function(){setLang('mr');});
  document.getElementById('btn-en').addEventListener('click',function(){setLang('en');});

  // CHANGE event delegation — handles ALL dynamic dropdowns/inputs
  document.addEventListener('change',function(ev){
    var t=ev.target;if(!t)return;
    var id=t.id||'';
    var act=t.getAttribute('data-action')||'';

    if(id==='l-role'){onRole();}
    else if(id==='m-cls'){onMCls();}
    else if(id==='m-subj'){loadMkTable();}
    else if(id==='d-cls'){onDCls();}
    else if(id==='d-subj'){loadDescTable();}
    else if(id==='i-cls'){loadStdByClass('i-cls','i-roll');refreshIssued();}
    else if(id==='is-cls'){refreshIssued();}
    else if(id==='rt-cls'){filterReturn();}
    else if(id==='rb-cls'){loadRBook();}
    else if(id==='pc-cls'){loadStdsForCard();}
    else if(id==='gos-cls'){loadGosawara();}
    else if(act==='setmk'){
      var sid=parseInt(t.getAttribute('data-sid')||0);
      var cls2=t.getAttribute('data-cls')||'';
      var subj2=t.getAttribute('data-subj')||'';
      var exam2=t.getAttribute('data-exam')||'';
      var mx=parseFloat(t.getAttribute('data-max')||0);
      var val=parseFloat(t.value)||0;
      if(mx&&val>mx){t.value=mx;val=mx;t.classList.add('err');}
      else{t.classList.remove('err');}
      if(sid&&cls2&&subj2&&exam2){
        setMk(sid,cls2,subj2,exam2,t.value);
        updateRowTotal(sid,cls2,subj2);
      }
    }
    else if(act==='toggleLock'){
      settings.marksLocked=t.checked;
      syncSettings();
      toast(t.checked?'गुण नोंदणी बंद केली!':'गुण नोंदणी सुरू केली!');
    }
  });

  // INPUT event for text search boxes
  document.addEventListener('input',function(ev){
    var id=(ev.target||{}).id||'';
    if(id==='rt-q')filterReturn();
    else if(id==='is-q')refreshIssued();
  });

  // CLICK event delegation — ALL click actions via data-action
  document.addEventListener('click',function(ev){
    var el=ev.target;
    while(el&&el.tagName&&el.tagName!=='BODY'){
      var act=(el.getAttribute&&el.getAttribute('data-action'))||'';
      if(act){
        // Tab navigation
        if(act==='showtab'){showTab(el.getAttribute('data-tabid')||'');}
        // Library
        else if(act==='issuebook'){issueBook();}
        else if(act==='returnbook'){returnBook(parseInt(el.getAttribute('data-txid')||0));}
        else if(act==='addbook'){addBook();}
        else if(act==='addstudent'){addStudent();}
        else if(act==='stdaction'){stdAction(parseInt(el.getAttribute('data-sid')||0));}
        // Results
        else if(act==='saveallmk'){
          var mc=el.getAttribute('data-cls')||'';
          var ms=el.getAttribute('data-subj')||'';
          if(!mc){mc=(document.getElementById('m-cls')||{}).value||'';}
          if(!ms){ms=(document.getElementById('m-subj')||{}).value||'';}
          if(mc&&ms)saveAllMk(mc,ms);
        }
        else if(act==='savealldesc'){
          var dc=el.getAttribute('data-cls')||'';
          var ds=el.getAttribute('data-subj')||'';
          if(dc&&ds)saveAllDesc(dc,ds);
        }
        else if(act==='gencard'){genCard();}
        // Admin
        else if(act==='changepw'){changePW();}
        else if(act==='changetcpw'){changeTcPw(parseInt(el.getAttribute('data-tcid')||0));}
        else if(act==='promoteall'){promoteAll();}
        // Misc
        else if(act==='print'){window.print();}
        else if(act==='emailcontact'){try{window.location.href='mailto:emvepatekar@gmail.com';}catch(e){}}
        break;
      }
      el=el.parentNode;
    }
  });
});
</script>
