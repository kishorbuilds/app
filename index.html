<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EMVE School App</title>
<style>
:root{
  --s:#C8500A;--s2:#E87030;--d:#1A1C2E;--d2:#262840;
  --g:#1A6E3C;--g2:#23A058;--r:#B02020;--b:#1A4A98;
  --gold:#B8860A;--pur:#5A2898;--bg:#F3EDE4;--card:#FFF;
  --bdr:#DDD5C5;--mt:#786858;
  --sh:0 2px 16px rgba(0,0,0,.07);--shl:0 8px 36px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Kohinoor Devanagari','Noto Sans Devanagari',Arial,sans-serif;background:var(--bg);color:var(--d);min-height:100vh;font-size:14px;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--d) 0%,var(--d2) 50%,#30186A 100%);padding:14px;}
.lbox{background:#fff;border-radius:20px;padding:28px 24px;width:100%;max-width:390px;box-shadow:var(--shl);}
.lemb{width:62px;height:62px;background:linear-gradient(135deg,var(--s),var(--s2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:8px;}
.lschool{font-size:1rem;font-weight:700;color:var(--d);}
.lsub{font-size:.7rem;color:var(--mt);}
.llib{font-size:.78rem;font-weight:700;color:var(--s);background:#FFF3E8;padding:4px 10px;border-radius:7px;border-left:3px solid var(--s);display:inline-block;margin-top:6px;}
.lf label{display:block;font-size:.69rem;font-weight:700;color:var(--mt);margin-bottom:3px;text-transform:uppercase;margin-top:10px;}
.lf select,.lf input{width:100%;padding:9px 11px;border:1.5px solid var(--bdr);border-radius:8px;font-family:inherit;font-size:.88rem;background:#fff;}
.lf select:focus,.lf input:focus{outline:none;border-color:var(--s);}
.lbtn{width:100%;padding:11px;background:linear-gradient(135deg,var(--s),var(--s2));color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:.94rem;font-weight:700;cursor:pointer;margin-top:13px;}
.ltog{display:flex;gap:7px;justify-content:flex-end;margin-bottom:12px;}
.ltbtn{padding:4px 11px;border:1.5px solid var(--bdr);border-radius:20px;background:#fff;font-family:inherit;font-size:.74rem;cursor:pointer;color:var(--mt);}
.ltbtn.on{background:var(--s);color:#fff;border-color:var(--s);}

/* APP */
#app{display:none;}
header{background:var(--d);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.hi{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;max-width:1400px;margin:0 auto;gap:7px;}
.hl{display:flex;align-items:center;gap:8px;min-width:0;flex:1;}
.hico{width:34px;height:34px;background:linear-gradient(135deg,var(--s),var(--s2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.hinfo{min-width:0;}
.htop{font-size:.53rem;opacity:.5;}
.hmain{font-size:.85rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hsub{font-size:.56rem;opacity:.55;}
.hr{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ubdg{background:rgba(255,255,255,.11);border-radius:18px;padding:3px 9px;font-size:.7rem;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.rchip{font-size:.61rem;padding:2px 6px;border-radius:7px;font-weight:700;}
.rs{background:#FEF3E2;color:var(--gold);}
.rm{background:#E6F5EC;color:var(--g);}
.rt{background:#EBF4FF;color:var(--b);}
.sbtn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;padding:4px 9px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.69rem;}
#sync{font-size:.65rem;color:#23A058;}

/* HOME */
.modules{display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:500px;margin:22px auto;padding:0 13px;}
.mcard{background:#fff;border-radius:14px;padding:22px 14px;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:all .2s;border-top:4px solid var(--s);}
.mcard:hover{transform:translateY(-3px);box-shadow:var(--shl);}
.mcard.lib{border-top-color:var(--b);}
.mcard.res{border-top-color:var(--g);}
.micon{font-size:2rem;margin-bottom:9px;}
.mtit{font-size:.96rem;font-weight:700;color:var(--d);}
.mdesc{font-size:.71rem;color:var(--mt);margin-top:3px;}

/* NAV */
nav{background:#fff;border-bottom:2px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
nav::-webkit-scrollbar{display:none;}
.ni{display:flex;max-width:1400px;margin:0 auto;padding:0 3px;}
.tab{padding:9px 11px;cursor:pointer;white-space:nowrap;font-size:.74rem;font-weight:600;color:var(--mt);border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:3px;}
.tab:hover{color:var(--s);}
.tab.on{color:var(--s);border-bottom-color:var(--s);}
.tab.hide{display:none;}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:13px 11px;}
.sec{display:none;}
.sec.on{display:block;}
.card{background:var(--card);border-radius:12px;padding:15px;box-shadow:var(--sh);margin-bottom:13px;}
.ct{font-size:.84rem;font-weight:700;color:var(--d);margin-bottom:11px;padding-bottom:7px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ctag{font-size:.61rem;background:var(--bg);color:var(--mt);padding:2px 6px;border-radius:6px;}
.bbtn{margin-bottom:11px;padding:6px 12px;background:var(--bg);border:1.5px solid var(--bdr);border-radius:7px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:13px;}
.sc{background:#fff;border-radius:10px;padding:11px 9px;box-shadow:var(--sh);text-align:center;border-top:4px solid var(--s);}
.sc.g{border-top-color:var(--g);}
.sc.r{border-top-color:var(--r);}
.sc.b{border-top-color:var(--b);}
.sc.p{border-top-color:var(--pur);}
.sc.gold{border-top-color:var(--gold);}
.sn{font-size:1.5rem;font-weight:700;color:var(--d);}
.sl{font-size:.64rem;color:var(--mt);margin-top:2px;}

/* FORMS */
.fg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px;margin-bottom:9px;}
.fg label{display:block;font-size:.68rem;font-weight:700;color:var(--mt);margin-bottom:3px;text-transform:uppercase;}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-family:inherit;font-size:.82rem;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--s);}

/* BUTTONS */
.btn{padding:7px 13px;border:none;border-radius:7px;font-family:inherit;font-size:.79rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.bp{background:var(--s);color:#fff;}
.bs{background:var(--g);color:#fff;}
.bd{background:var(--r);color:#fff;}
.bb{background:var(--b);color:#fff;}
.bo{background:#fff;color:var(--s);border:1.5px solid var(--s);}
.bsm{padding:4px 9px;font-size:.7rem;}
.bgold{background:var(--gold);color:#fff;}

/* TABLE */
.tw{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;}
th{background:var(--bg);padding:7px 8px;text-align:left;font-size:.66rem;font-weight:700;color:var(--mt);text-transform:uppercase;white-space:nowrap;}
td{padding:7px 8px;border-bottom:1px solid var(--bdr);font-size:.78rem;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FDFAF5;}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 6px;border-radius:18px;font-size:.65rem;font-weight:700;white-space:nowrap;}
.bgg{background:#E6F5EC;color:var(--g);}
.bgr{background:#FDECEA;color:var(--r);}
.bgy{background:#FEF3E2;color:var(--gold);}
.bgb{background:#EBF4FF;color:var(--b);}
.bgp{background:#F0EAFA;color:var(--pur);}

/* SEARCH */
.sb{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.sb input,.sb select{padding:7px 10px;border:1.5px solid var(--bdr);border-radius:7px;font-family:inherit;font-size:.8rem;background:#fff;}
.sb input{flex:1;min-width:120px;}

/* ALERTS */
.alert{border-radius:9px;padding:9px 12px;margin-bottom:11px;display:flex;align-items:flex-start;gap:7px;font-size:.78rem;}
.aw{background:#FFF3F0;border:1.5px solid #FFCAB8;}
.ai{background:#EBF4FF;border:1.5px solid #BDD9FF;}
.ag{background:#E6F5EC;border:1.5px solid #A8DDB9;}

/* PROGRESS BAR */
.pbar{background:#E5E7EB;border-radius:20px;height:9px;overflow:hidden;min-width:60px;}
.pfill{height:100%;border-radius:20px;transition:width 1s ease;}

/* MARKS INPUT */
.mi{width:48px;padding:3px 4px;border:1.5px solid var(--bdr);border-radius:5px;font-family:inherit;font-size:.76rem;text-align:center;background:#FFFDE7;}
.mi:focus{outline:none;border-color:var(--s);}
.mi.err{border-color:var(--r);background:#FFF0F0;}

/* TOGGLE SWITCH */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:var(--bg);border-radius:8px;margin-bottom:8px;}
.tsw{position:relative;width:44px;height:22px;flex-shrink:0;}
.tsw input{opacity:0;width:0;height:0;}
.tsl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s;}
.tsl:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.tsl{background:var(--g);}
input:checked+.tsl:before{transform:translateX(22px);}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:500;display:none;align-items:center;justify-content:center;padding:13px;}
.mov.op{display:flex;}
.mbox{background:#fff;border-radius:15px;padding:20px;max-width:460px;width:100%;box-shadow:var(--shl);max-height:90vh;overflow-y:auto;}
.mbox h3{font-size:.93rem;margin-bottom:10px;color:var(--d);}
.mfoot{display:flex;gap:7px;justify-content:flex-end;margin-top:11px;}

/* TOAST */
#toast{position:fixed;bottom:16px;right:14px;background:var(--d);color:#fff;padding:9px 14px;border-radius:9px;font-size:.78rem;box-shadow:var(--shl);transform:translateY(70px);opacity:0;transition:all .3s;z-index:999;max-width:250px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{background:var(--g);}
#toast.err{background:var(--r);}

/* DONOR HERO */
.dhero{background:linear-gradient(135deg,var(--d) 0%,var(--d2) 50%,#2A1060 100%);border-radius:14px;padding:22px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;}
.dh-bg{position:absolute;right:-15px;top:-15px;font-size:120px;opacity:.06;}
.dh-rel{position:relative;z-index:1;}
.dhstats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:16px;}
.dhs{background:rgba(255,255,255,.11);border-radius:9px;padding:11px;text-align:center;}
.dhs-n{font-size:1.5rem;font-weight:700;}
.dhs-l{font-size:.64rem;opacity:.7;margin-top:2px;}

/* PROGRESS CARD PRINT */
.pcard-wrap{border:2px solid #000;font-family:Arial,sans-serif;font-size:.82rem;line-height:1.5;}
.pcard-top{text-align:center;border-bottom:2px solid #000;padding:10px;}
.pcard-school{font-size:1.05rem;font-weight:900;}
.pcard-title{font-size:1.2rem;font-weight:700;margin:5px 0;}
.pcard-info{display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:8px;border-bottom:1px solid #000;font-size:.76rem;}
.pcard-row{display:flex;gap:4px;padding:1px 0;border-bottom:1px dotted #ddd;}
.pcard-marks{width:100%;border-collapse:collapse;margin-top:8px;font-size:.74rem;}
.pcard-marks th,.pcard-marks td{border:1px solid #000;padding:4px 5px;text-align:center;}
.pcard-marks th{background:#F0F0F0;font-size:.68rem;}
.pcard-attend{width:100%;border-collapse:collapse;margin-top:8px;font-size:.7rem;}
.pcard-attend th,.pcard-attend td{border:1px solid #000;padding:3px 4px;text-align:center;font-size:.66rem;}
.pcard-grade-tbl{width:100%;border-collapse:collapse;margin-top:6px;font-size:.7rem;}
.pcard-grade-tbl th,.pcard-grade-tbl td{border:1px solid #000;padding:3px 5px;text-align:center;}
.pcard-rules{font-size:.68rem;line-height:1.5;padding:6px;border-top:1px solid #000;margin-top:6px;}
.pcard-signs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px;border-top:1px solid #000;font-size:.72rem;text-align:center;margin-top:4px;}

/* RESPONSIVE */
@media(max-width:600px){
  .hi{padding:7px 10px;}
  .hmain{font-size:.78rem;}
  main{padding:10px 8px;}
  .modules{max-width:100%;grid-template-columns:1fr 1fr;}
  .dhstats{grid-template-columns:repeat(2,1fr);}
  .fg2{grid-template-columns:1fr;}
  .ubdg .uname-full{display:none;}
}
@media(min-width:1024px){
  .sg{grid-template-columns:repeat(6,1fr);}
  .modules{max-width:600px;grid-template-columns:repeat(2,1fr);}
}
@media print{
  header,nav,.btn,.bbtn,#toast,.sbtn,.ltog,.no-print{display:none!important;}
  body{background:#fff;}
  .pcard-wrap{box-shadow:none!important;}
  main{padding:0!important;}
  .sec{display:block!important;}
  .card{box-shadow:none;border:1px solid #ddd;}
}
</style>
</head>

function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}

function getMk(sId,cls,subj,exam){
  var k=cls+'|'+subj+'|'+exam;

}
function setMk(sId,cls,subj,exam,val){
  var k=cls+'|'+subj+'|'+exam;

  var idx=-1;for(var _i=0;_i<marksData[k].length;_i++){if(marksData[k][_i].sId===sId){idx=_i;break;}}
  if(idx>=0)marksData[k][idx].m=val;

}

function calcTotal(sId,cls,subj){
  var type=getCtype(cls);
  var exams=getExams(cls);
  var total=0;var hasAny=false;
  exams.forEach(function(e){
    var v=parseFloat(getMk(sId,cls,subj,e.key))||0;
    total+=v;if(getMk(sId,cls,subj,e.key)!=='')hasAny=true;

    if(pw!==PW.super){loginErr('\u092A\u093E\u0938\u0935\u0930\u094D\u0921 \u091A\u0941\u0915\u0940\u091A\u093E!');return;}
    curRole='super';curUser='\u0938\u0902\u0938\u094D\u0925\u093E\u091A\u093E\u0932\u0915';curTc=null;
  } else if(r==='mukh'){
    if(pw!==PW.mukh){loginErr('\u092A\u093E\u0938\u0935\u0930\u094D\u0921 \u091A\u0941\u0915\u0940\u091A\u093E!');return;}
    curRole='mukh';curUser='\u092E\u0941\u0916\u094D\u092F\u093E\u0927\u094D\u092F\u093E\u092A\u0915';curTc=null;
  } else {
    var tid=parseInt(document.getElementById('l-tc').value)||0;
    if(!tid){loginErr('\u0936\u093F\u0915\u094D\u0937\u0915 \u0928\u093F\u0935\u0921\u093E!');return;}
    var tc=TEACHERS.find(function(t){return t.id===tid;});
    if(!tc||pw!==tc.pw){loginErr('\u092A\u093E\u0938\u0935\u0930\u094D\u0921 \u091A\u0941\u0915\u0940\u091A\u093E!');return;}
    curRole='shik';curUser=tc.name;curTc=tc;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  setupHeader();showHome();loadShikshakFirst();
}

function loginErr(msg){
  var p=document.getElementById('l-pw');
  p.style.borderColor='var(--r)';p.value='';p.placeholder=msg;
  setTimeout(function(){p.style.borderColor='';p.placeholder='\u092A\u093E\u0938\u0935\u0930\u094D\u0921 \u091F\u093E\u0915\u093E...';},2500);
}

  document.getElementById('app').style.display='none';
  document.getElementById('home-view').style.display='none';
  document.getElementById('mod-view').style.display='none';

function buildTabs(){
  var isA=(curRole==='super'||curRole==='mukh');
  var tabs=curMod==='lib'?[
    {id:'ld',i:'\uD83C\uDFE0',l:'\u0921\u0945\u0936\u092C\u094B\u0930\u094D\u0921',h:false},
    {id:'li',i:'\uD83D\uDCE4',l:'\u0926\u094D\u092F\u093E',h:false},
    {id:'lr',i:'\uD83D\uDCE5',l:'\u092A\u0930\u0924',h:false},
    {id:'lc',i:'\uD83D\uDCD6',l:'\u0917\u094D\u0930\u0902\u0925\u0938\u0942\u091A\u0940',h:false},
    {id:'ls',i:'\uD83D\uDC68\u200D\uD83C\uDF93',l:'\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940',h:false},
    {id:'lrp',i:'\uD83D\uDCCA',l:'\u0905\u0939\u0935\u093E\u0932',h:!isA},
    {id:'ldon',i:'\uD83E\uDD1D',l:'\u0926\u0947\u0923\u0917\u0940\u0926\u093E\u0930',h:!isA},
    {id:'la',i:'\u2699\uFE0F',l:'\u092A\u094D\u0930\u0936\u093E\u0938\u0928',h:!isA},
  ]:[
    {id:'rd',i:'\uD83C\uDFE0',l:'\u0921\u0945\u0936\u092C\u094B\u0930\u094D\u0921',h:false},
    {id:'rm',i:'\u270F\uFE0F',l:'\u0917\u0941\u0923 \u0928\u094B\u0902\u0926\u0923\u0940',h:false},
    {id:'rdesc',i:'\uD83D\uDCDD',l:'\u0935\u0930\u094D\u0923\u0928\u093E\u0924\u094D\u092E\u0915',h:false},
    {id:'rprog',i:'\uD83D\uDCC8',l:'\u092A\u094D\u0930\u0917\u0924\u0940',h:false},
    {id:'rbook',i:'\uD83D\uDCD3',l:'\u0928\u093F\u0915\u093E\u0932 \u092A\u0941\u0938\u094D\u0924\u0915',h:!isA},
    {id:'rcard',i:'\uD83D\uDCCB',l:'\u092A\u094D\u0930\u0917\u0924\u0940\u092A\u0924\u094D\u0930',h:false},
    {id:'radm',i:'\u2699\uFE0F',l:'\u0935\u094D\u092F\u0935\u0938\u094D\u0925\u093E\u092A\u0928',h:!isA},
  ];
  var nav=document.getElementById('nav-tabs');nav.innerHTML='';
  var first=null;
  tabs.forEach(function(tb){
    if(tb.h)return;
    if(!first)first=tb.id;
    var d=document.createElement('div');
    d.className='tab';d.id='tab-'+tb.id;
    d.innerHTML=tb.i+' '+tb.l;
    d.onclick=(function(id){return function(){showTab(id);};})(tb.id);
    nav.appendChild(d);
  });
  if(first)showTab(first);
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  var tb=document.getElementById('tab-'+id);
  if(tb)tb.classList.add('on');
  curTab=id;
  var el=document.getElementById('mod-secs');
  if(!el)return;
  el.innerHTML='<div style="padding:18px;text-align:center;color:var(--mt);">\u23F3 \u0932\u094B\u0921...</div>';
  // Render after small delay for UX
  setTimeout(function(){renderSec(id);},50);
}

function renderSec(id){
  var el=document.getElementById('mod-secs');if(!el)return;
  var html='<div class="alert aw"><div>\u26A0\uFE0F</div><div>Section not found: '+id+'</div></div>';
  try{
    if(id==='ld')html=secLD();
    else if(id==='li')html=secLI();
    else if(id==='lr')html=secLR();
    else if(id==='lc')html=secLC();
    else if(id==='ls')html=secLS();
    else if(id==='lrp')html=secLRP();
    else if(id==='ldon')html=secLDon();
    else if(id==='la')html=secLA();
    else if(id==='rd')html=secRD();
    else if(id==='rm')html=secRM();
    else if(id==='rdesc')html=secRDesc();
    else if(id==='rprog')html=secRProg();
    else if(id==='rbook')html=secRBook();
    else if(id==='rcard')html=secRCard();
    else if(id==='radm')html=secRAdm();
  }catch(e){html='<div class="alert aw"><div>\u26A0\uFE0F Error: '+e.message+'</div></div>';}
  el.innerHTML=html;
  // Post-render hooks
  if(id==='li'){loadStdByClass();refreshIssued();}
  if(id==='lr'){filterReturn();}
  if(id==='lrp'){buildLibReport();}
  if(id==='rd'){buildResDash();}
  // Wire up data-action elements (Caja safe)
  setTimeout(function(){
    var locks=document.querySelectorAll('[data-action="toggleLock"]');
    for(var _i=0;_i<locks.length;_i++){
      (function(el2){
        el2.checked=settings.marksLocked;
        el2.addEventListener('change',function(){
          settings.marksLocked=this.checked;
          syncSettings();
          toast(this.checked?'गुण नोंदणी बंद केली!':'गुण नोंदणी सुरू केली!');
          buildResDash();
        });
      })(locks[_i]);
    }
    // Wire onchange for dynamic selects
    var mcls=document.getElementById('m-cls');if(mcls)mcls.addEventListener('change',onMCls);
    var dcls=document.getElementById('d-cls');if(dcls)dcls.addEventListener('change',onDCls);
    var rbcls=document.getElementById('rb-cls');if(rbcls)rbcls.addEventListener('change',loadRBook);
    var icls=document.getElementById('i-cls');if(icls)icls.addEventListener('change',loadStdByClass);
    var msubj=document.getElementById('m-subj');if(msubj)msubj.addEventListener('change',loadMkTable);
    var dsubj=document.getElementById('d-subj');if(dsubj)dsubj.addEventListener('change',loadDescTable);
    var rtcls=document.getElementById('rt-cls');if(rtcls)rtcls.addEventListener('change',filterReturn);
    var rtq=document.getElementById('rt-q');if(rtq)rtq.addEventListener('input',filterReturn);
    var isq=document.getElementById('is-q');if(isq)isq.addEventListener('input',refreshIssued);
    var iscls=document.getElementById('is-cls');if(iscls)iscls.addEventListener('change',refreshIssued);
    var pccls=document.getElementById('pc-cls');if(pccls)pccls.addEventListener('change',loadStdsForCard);
    document.addEventListener('change',function(ev){
      var t=ev.target;
      if(!t)return;
      var act=t.getAttribute('data-action');
      if(act==='toggleLock'){
        settings.marksLocked=t.checked;
        syncSettings();
        toast(t.checked?'गुण नोंदणी बंद!':'गुण नोंदणी सुरू!');
      } else if(act==='setmk'){
        var sid=parseInt(t.getAttribute('data-sid')||0);
        var cls2=t.getAttribute('data-cls')||'';
        var subj2=t.getAttribute('data-subj')||'';
        var exam2=t.getAttribute('data-exam')||'';
        if(sid&&cls2&&subj2&&exam2)setMk(sid,cls2,subj2,exam2,t.value);
      } else if(act==='setdesc'){
        var sid2=parseInt((t.id||'').replace('dp-','').replace('di-',''))||0;
        if(!sid2)return;
        var cls3=(document.getElementById('d-cls')||{}).value||'';
        var subj3=(document.getElementById('d-subj')||{}).value||'';
        if(!cls3||!subj3)return;
        var dp2=document.getElementById('dp-'+sid2);
        var di2=document.getElementById('di-'+sid2);
        var dc2=document.getElementById('dc-'+sid2);
        setDesc(sid2,cls3,subj3,{pos:dp2?dp2.value:'',imp:di2?di2.value:'',custom:dc2?dc2.value:''});
      }
    });
  },100);
}

function secLD(){
  var total=books.reduce(function(s,b){return s+b.copies;},0);
  var issd=transactions.filter(function(t){return !t.retDate;}).length;
  var over=transactions.filter(function(t){return !t.retDate&&dL(t.due)>0;});
  var actS=students.filter(function(s){return s.status!=='removed';}).length;
  var ret=transactions.filter(function(t){return t.retDate;}).length;
  var withT=transactions.filter(function(t){return t.tId;}).length;

  // Teacher chart
  var tcStats=TEACHERS.filter(function(t){return !t.isMukh;}).map(function(tc){
    return{name:tc.name.split(' ').slice(0,2).join(' '),cnt:transactions.filter(function(t){return t.tId===tc.id;}).length};
  }).sort(function(a,b){return b.cnt-a.cnt;}).slice(0,6);
  var maxT=Math.max.apply(null,[1].concat(tcStats.map(function(t){return t.cnt;})));
  var colors=['#C8500A','#1A4A98','#1A6E3C','#5A2898','#B8860A','#B02020'];
  var tcBars=tcStats.map(function(t,i){
    var h=Math.max(Math.round(t.cnt/maxT*70),3);
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;"><div title="'+t.name+': '+t.cnt+'" style="width:90%;height:'+h+'px;background:'+colors[i%6]+';border-radius:3px 3px 0 0;"></div><div style="font-size:.56rem;color:var(--mt);margin-top:2px;text-align:center;overflow:hidden;max-width:48px;white-space:nowrap;text-overflow:ellipsis;">'+t.name.split(' ').pop()+'</div></div>';
  }).join('');

  // Class chart
  var clsBars=CLASSES.map(function(c,i){
    var cnt=transactions.filter(function(t){return t.cls===c.id&&t.retDate;}).length;
    var h=Math.max(cnt,0);
    var maxC=Math.max.apply(null,[1].concat(CLASSES.map(function(cl){return transactions.filter(function(t){return t.cls===cl.id&&t.retDate;}).length;})));
    var hp=Math.max(Math.round(cnt/maxC*70),2);
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;"><div style="width:90%;height:'+hp+'px;background:var(--b);border-radius:3px 3px 0 0;" title="'+c.label+': '+cnt+'"></div><div style="font-size:.56rem;color:var(--mt);margin-top:2px;text-align:center;">'+c.label.replace(' \u0935\u0940','')+'</div></div>';
  }).join('');

  var overRows=over.length===0?'<tr><td colspan="5" style="text-align:center;color:var(--mt);padding:14px;">\u2705 \u0915\u094B\u0923\u0924\u0940\u0939\u0940 \u0928\u093E\u0939\u0940</td></tr>':
    over.map(function(tx){return '<tr><td>'+tx.sName+'</td><td>'+tx.cls+'</td><td>'+tx.bTitle+'</td><td><span class="bdg bgr">+'+dL(tx.due)+' \u0926\u093F.</span></td></tr>';}).join('');

  return '<div class="sg">'+
    '<div class="sc"><div class="sn">'+total+'</div><div class="sl">\u0938\u0930\u094D\u0935 \u092A\u0941\u0938\u094D\u0924\u0915\u0947</div></div>'+
    '<div class="sc g"><div class="sn">'+(total-issd)+'</div><div class="sl">\u0909\u092A\u0932\u092C\u094D\u0927</div></div>'+
    '<div class="sc r"><div class="sn">'+over.length+'</div><div class="sl">\u092E\u0941\u0926\u0924 \u0938\u0902\u092A\u0932\u0940</div></div>'+
    '<div class="sc b"><div class="sn">'+actS+'</div><div class="sl">\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940</div></div>'+
    '<div class="sc p"><div class="sn">'+withT+'</div><div class="sl">\u0936\u093F\u0915\u094D\u0937\u0915 \u092A\u094D\u0930\u0947\u0930\u093F\u0924</div></div>'+
    '<div class="sc gold"><div class="sn">'+ret+'</div><div class="sl">\u0935\u093E\u091A\u0932\u0947\u0932\u0940</div></div>'+
    '</div>'+
    (over.length>0?'<div class="alert aw"><div>\u26A0\uFE0F</div><div><strong style="color:var(--r)">\u092E\u0941\u0926\u0924 \u0938\u0902\u092A\u0932\u0947\u0932\u0940 \u092A\u0941\u0938\u094D\u0924\u0915\u0947: '+over.length+'</strong> \u2014 \u0924\u093E\u0924\u094D\u0915\u093E\u0933 \u092A\u0930\u0924 \u092E\u093E\u0917\u0935\u093E</div></div>':'')+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;">'+
    '<div class="card"><div class="ct">\uD83D\uDC68\u200D\uD83C\uDFEB \u0936\u093F\u0915\u094D\u0937\u0915 \u092A\u094D\u0930\u0947\u0930\u0923\u093E</div><div style="display:flex;align-items:flex-end;gap:3px;height:80px;">'+tcBars+'</div></div>'+
    '<div class="card"><div class="ct">\uD83C\uDFEB \u0935\u0930\u094D\u0917\u0928\u093F\u0939\u093E\u092F \u0935\u093E\u091A\u0928</div><div style="display:flex;align-items:flex-end;gap:2px;height:80px;">'+clsBars+'</div></div>'+
    '</div>'+
    '<div class="card"><div class="ct">\u23F0 \u092E\u0941\u0926\u0924 \u0938\u0902\u092A\u0932\u0947\u0932\u0940</div><div class="tw"><table><thead><tr><th>\u0928\u093E\u0935</th><th>\u0935\u0930\u094D\u0917</th><th>\u092A\u0941\u0938\u094D\u0924\u0915</th><th>\u0925\u0915\u0940\u0924</th></tr></thead><tbody>'+overRows+'</tbody></table></div></div>';
}

  var tcOpts=TEACHERS.filter(function(t){return !t.isMukh;}).map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join('');
  return '<div class="card"><div class="ct">\uD83D\uDCE4 \u092A\u0941\u0938\u094D\u0924\u0915 \u0926\u0947\u0923\u0947</div>'+
    '<div class="fg2">'+
    '<div class="fg"><label>\u0935\u0930\u094D\u0917</label><select id="i-cls""><option value="">\u0928\u093F\u0935\u0921\u093E</option>'+clsOpts+'</select></div>'+
    '<div class="fg"><label>\u0939\u091C\u0947\u0930\u0940 \u0915\u094D\u0930.</label><select id="i-roll"><option value="">\u0928\u093F\u0935\u0921\u093E</option></select></div>'+
    '<div class="fg"><label>\u092A\u0941\u0938\u094D\u0924\u0915</label><select id="i-bk"><option value="">\u0928\u093F\u0935\u0921\u093E</option>'+bkOpts+'</select></div>'+
    '<div class="fg"><label>\u0924\u093E\u0930\u0940\u0916</label><input type="date" id="i-dt" value="'+today()+'"></div>'+
    '<div class="fg"><label>\u092A\u094D\u0930\u0947\u0930\u0915 \u0936\u093F\u0915\u094D\u0937\u0915 <span style="color:var(--r)">*\u0905\u0928\u093F\u0935\u093E\u0930\u094D\u092F</span></label><select id="i-tc"><option value="">-- \u0928\u093F\u0935\u0921\u093E --</option>'+tcOpts+'</select></div>'+
    '</div>'+
    '<div class="alert ai"><div>\uD83D\uDCC5</div><div>\u092E\u0941\u0926\u0924: <strong>7 \u0926\u093F\u0935\u0938</strong></div></div>'+
    '<button class="btn bp" data-action="issuebook">\uD83D\uDCE4 \u092A\u0941\u0938\u094D\u0924\u0915 \u0926\u094D\u092F\u093E</button>'+
    '</div>'+
    '<div class="card"><div class="ct">\uD83D\uDCCB \u0938\u0927\u094D\u092F\u093E \u0926\u093F\u0932\u0947\u0932\u0940</div>'+
    '<div class="sb"><input type="text" id="is-q" placeholder="\u0936\u094B\u0927\u093E...""><select id="is-cls""><option value="">\u0938\u0930\u094D\u0935 \u0935\u0930\u094D\u0917</option>'+clsOpts+'</select></div>'+
    '<div class="tw"><table><thead><tr><th>\u0928\u093E\u0935</th><th>\u0935\u0930\u094D\u0917</th><th>\u092A\u0941\u0938\u094D\u0924\u0915</th><th>\u0926\u093F\u0932\u0947</th><th>\u092E\u0941\u0926\u0924</th>'+(curRole!=='shik'?'<th>\u0936\u093F\u0915\u094D\u0937\u0915</th>':'')+'<th>\u0938\u094D\u0925\u093F\u0924\u0940</th></tr></thead><tbody id="is-body"></tbody></table></div></div>';

function loadStdByClass(){
  var cls=(document.getElementById('i-cls')||{}).value||'';
  var sel=document.getElementById('i-roll');if(!sel)return;
  sel.innerHTML='<option value="">\u0939\u091C\u0947\u0930\u0940 \u0915\u094D\u0930. \u0928\u093F\u0935\u0921\u093E</option>';
  students.filter(function(s){return s.status!=='removed'&&(!cls||s.cls===cls);}).sort(function(a,b){return parseInt(a.roll)-parseInt(b.roll);}).forEach(function(s){
    var o=document.createElement('option');o.value=s.id;o.textContent=s.roll+' - '+s.name;sel.appendChild(o);
  });
}

function refreshIssued(){
  var q=(document.getElementById('is-q')||{}).value||'';
  var cf=(document.getElementById('is-cls')||{}).value||'';
  var body=document.getElementById('is-body');if(!body)return;
  var isA=curRole!=='shik';
  var rows=transactions.filter(function(t){
    return !t.retDate&&
      (t.sName.toLowerCase().indexOf(q.toLowerCase())>=0||t.bTitle.toLowerCase().indexOf(q.toLowerCase())>=0)&&
      (!cf||t.cls===cf);
  });
  body.innerHTML=rows.length===0?'<tr><td colspan="7" style="text-align:center;color:var(--mt);padding:14px;">\u0915\u094B\u0923\u0924\u0947\u0939\u0940 \u0928\u093E\u0939\u0940</td></tr>':
    rows.map(function(t){
      var late=dL(t.due);

    var given=transactions.filter(function(tx){return tx.tId===tc.id;}).length;

    var _seen={};var _cnt=0;transactions.filter(function(tx){return tx.tId===tc.id;}).forEach(function(tx){if(!_seen[tx.sName]){_seen[tx.sName]=1;_cnt++;}});var stds=_cnt;
    return{name:tc.name,given:given,ret:ret,stds:stds,cls:tc.classOf};
  }).sort(function(a,b){return b.given-a.given;});

  var maxG=Math.max.apply(null,[1].concat(tcStats.map(function(t){return t.given;})));
  var tcRows=tcStats.map(function(tc){
    var pct=Math.round(tc.given/maxG*100);

  }).join('');

function buildResDash(){
  var el=document.getElementById('rd-content');if(!el)return;
  var isA=(curRole==='super'||curRole==='mukh');

  // Teacher progress infographic
  if(isA){
    var tcInfographic=TEACHERS.filter(function(t){return !t.isMukh;}).map(function(tc){
      var totalExpected=0;var done=0;
      tc.classes.forEach(function(cls){
        var stds2=getStds(cls);
        var subjs=getSubjs(cls).filter(function(s){return tc.subjects.indexOf(s)>=0;});
        var exams=getExams(cls);
        totalExpected+=stds2.length*subjs.length*exams.length;
        subjs.forEach(function(subj){
          exams.forEach(function(exam){
            var k=cls+'|'+subj+'|'+exam.key;
            if(marksData[k]){
              done+=marksData[k].filter(function(e){return e.m!=='';}).length;
            }
          });
        });
      });
      var pct=totalExpected>0?Math.round(done/totalExpected*100):0;
      var color=pct>=80?'var(--g)':pct>=50?'var(--gold)':'var(--r)';
      return '<div style="background:white;border-radius:10px;padding:12px;margin-bottom:8px;">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
        '<div style="font-size:.82rem;font-weight:700;">'+tc.name+'</div>'+
        '<div style="font-size:1rem;font-weight:700;color:'+color+';">'+pct+'%</div></div>'+
        '<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+color+';"></div></div>'+
        '<div style="display:flex;justify-content:space-between;font-size:.66rem;color:var(--mt);margin-top:3px;"><span>'+done+' \u0915\u0947\u0932\u0947</span><span>'+totalExpected+' \u090F\u0915\u0942\u0923</span></div></div>';
    }).join('');

    // Class-wise topper
    var classToppers=CLASSES.map(function(c){
      var stds2=getStds(c.id);
      if(!stds2.length)return null;
      var ranked=stds2.map(function(s){
        var totalMarks=0;var maxMarks=0;
        var subjs=getSubjs(c.id);
        var exams=getExams(c.id);
        subjs.forEach(function(subj){
          exams.forEach(function(exam){
            var v=parseFloat(getMk(s.id,c.id,subj,exam.key))||0;
            totalMarks+=v;maxMarks+=exam.max;
          });
        });
        var pct=maxMarks>0?Math.round(totalMarks/maxMarks*100):0;
        return{name:s.name,roll:s.roll,pct:pct};
      }).sort(function(a,b){return b.pct-a.pct;});
      return{cls:c.label,toppers:ranked.slice(0,3)};
    }).filter(function(x){return x;});

    var topperRows=classToppers.map(function(ct){
      var badges=ct.toppers.map(function(t,i){
        var medal=['&#x1F947;','&#x1F948;','&#x1F949;'][i];
        return '<span style="font-size:.74rem;margin-right:4px;">'+medal+' '+t.name.split(' ').pop()+' ('+t.pct+'%)</span>';
      }).join('');
      return '<tr><td><strong>'+ct.cls+'</strong></td><td>'+badges+'</td></tr>';
    }).join('');

    el.innerHTML=
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
      '<div class="card"><div class="ct">\uD83D\uDC68\u200D\uD83C\uDFEB \u0936\u093F\u0915\u094D\u0937\u0915 \u092A\u094D\u0930\u0917\u0924\u0940 \uD83D\uDCCA</div>'+tcInfographic+'</div>'+
      '<div class="card"><div class="ct">\uD83C\uDFC6 \u0935\u0930\u094D\u0917\u092A\u094D\u0930\u092E\u0941\u0916 \u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940</div>'+
      '<div class="tw"><table><thead><tr><th>\u0935\u0930\u094D\u0917</th><th>\u0936\u094D\u0930\u0947\u0937\u094D\u0920 \u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940</th></tr></thead><tbody>'+topperRows+'</tbody></table></div></div>'+
      '</div>'+
      '<div class="card"><div class="ct">\u2699\uFE0F \u0928\u093F\u0915\u093E\u0932 \u0928\u093F\u092F\u0902\u0924\u094D\u0930\u0923 <span class="ctag">\u092B\u0915\u094D\u0924 \u0935\u0930\u093F\u0937\u094D\u0920</span></div>'+
      '<div class="trow"><div><div style="font-weight:600;">\uD83D\uDD12 \u0917\u0941\u0923 \u0928\u094B\u0902\u0926\u0923\u0940 \u092C\u0902\u0926</div><div style="font-size:.72rem;color:var(--mt);">\u0936\u093F\u0915\u094D\u0937\u0915\u093E\u0902\u0928\u093E \u0917\u0941\u0923 \u092D\u0930\u0923\u094D\u092F\u0930 \u0925\u093E\u0902\u092C\u0935\u093E</div></div>'+
      '<label class="tsw"><input type="checkbox" id="tg-lock" '+(settings.marksLocked?'checked':'')+' data-action="toggleLock"><span class="tsl"></span></label></div>'+
      '</div>';
  } else if(curTc){
    // Teacher view
    var myStds=[];curTc.classes.forEach(function(cls){myStds=myStds.concat(getStds(cls));});
    var myDone=0;var myExp=0;
    curTc.classes.forEach(function(cls){
      var stds2=getStds(cls);
      var subjs=getSubjs(cls).filter(function(s){return curTc.subjects.indexOf(s)>=0;});
      var exams=getExams(cls);
      myExp+=stds2.length*subjs.length*exams.length;
      subjs.forEach(function(subj){
        exams.forEach(function(exam){
          var k=cls+'|'+subj+'|'+exam.key;
          if(marksData[k])myDone+=marksData[k].filter(function(e){return e.m!=='';}).length;
        });
      });
    });
    var myPct=myExp>0?Math.round(myDone/myExp*100):0;
    var myColor=myPct>=80?'var(--g)':myPct>=50?'var(--gold)':'var(--r)';
    el.innerHTML=
      '<div class="sg">'+
      '<div class="sc b"><div class="sn">'+curTc.subjects.length+'</div><div class="sl">\u0935\u093F\u0937\u092F</div></div>'+
      '<div class="sc"><div class="sn">'+curTc.classes.length+'</div><div class="sl">\u0935\u0930\u094D\u0917</div></div>'+
      (curTc.classOf?'<div class="sc g"><div class="sn">'+curTc.classOf+'</div><div class="sl">\u0935\u0930\u094D\u0917\u0936\u093F\u0915\u094D\u0937\u0915</div></div>':'')+
      '<div class="sc p"><div class="sn">'+myStds.length+'</div><div class="sl">\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940</div></div>'+
      '</div>'+
      '<div class="card"><div class="ct">\uD83D\uDCCA \u092E\u093E\u091D\u0940 \u0917\u0941\u0923 \u0928\u094B\u0902\u0926\u0923\u0940 \u092A\u094D\u0930\u0917\u0924\u0940</div>'+
      '<div style="font-size:1.8rem;font-weight:700;color:'+myColor+';margin-bottom:6px;">'+myPct+'%</div>'+
      '<div class="pbar"><div class="pfill" style="width:'+myPct+'%;background:'+myColor+';"></div></div>'+
      '<div style="font-size:.74rem;color:var(--mt);margin-top:4px;">'+myDone+' / '+myExp+' \u0928\u094B\u0902\u0926\u0940</div></div>'+
      (settings.marksLocked?'<div class="alert aw"><div>\uD83D\uDD12</div><div><strong>\u0917\u0941\u0923 \u0928\u094B\u0902\u0926\u0923\u0940 \u092C\u0902\u0926 \u0906\u0939\u0947</strong></div></div>':'');
  }
}

function onMCls(){
  var cls=(document.getElementById('m-cls')||{}).value||'';
  var sel=document.getElementById('m-subj');if(!sel)return;
  var subjs=cls?getSubjs(cls):[];
  if(curRole==='shik'&&curTc){subjs=subjs.filter(function(s){return curTc.subjects.indexOf(s)>=0;});}
  sel.innerHTML='<option value="">\u0928\u093F\u0935\u0921\u093E</option>'+
    subjs.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join('');
  document.getElementById('mk-wrap').innerHTML='';
}

function loadMkTable(){
  var cls=(document.getElementById('m-cls')||{}).value||'';
  var subj=(document.getElementById('m-subj')||{}).value||'';
  var wrap=document.getElementById('mk-wrap');if(!wrap)return;
  if(!cls||!subj){wrap.innerHTML='';return;}
  var stds2=getStds(cls);
  if(!stds2.length){wrap.innerHTML='<div class="alert aw"><div>\uD83D\uDCED</div><div>\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940 \u0928\u093E\u0939\u0940\u0924</div></div>';return;}
  var exams=getExams(cls);
  // Group exam headers
  var groups={};
  exams.forEach(function(e){groups[e.group]=(groups[e.group]||[]).concat([e]);});
  var groupKeys=[];
  exams.forEach(function(e){if(groupKeys.indexOf(e.group)<0)groupKeys.push(e.group);});

  var thGroup=groupKeys.map(function(g){return '<th colspan="'+groups[g].length+'" style="text-align:center;background:var(--d);color:white;">'+g+'</th>';}).join('');
  var thExams=exams.map(function(e){return '<th style="text-align:center;">'+e.label+'<br><span style="font-weight:400;font-size:.62rem;">/'+e.max+'</span></th>';}).join('');

  var rows=stds2.map(function(s){
    var cells=exams.map(function(e){
      var v=getMk(s.id,cls,subj,e.key);
      return '<td><input class="mi" type="number" min="0" max="'+e.max+'" value="'+v+'" id="mk-'+s.id+'-'+e.key+'" data-action="setmk"></td>';
    }).join('');
    // Calculate current total
    var t=calcTotal(s.id,cls,subj);
    var gr=t.total!==''?grade(Math.round(t.total/t.max*100)):'-';
    var gc=gradeColor(gr);
    return '<tr><td><strong>'+s.roll+'</strong></td><td>'+s.name+'</td>'+cells+'<td style="font-weight:700;">'+(t.total||'-')+'</td><td><span class="bdg '+gc+'">'+gr+'</span></td></tr>';
  }).join('');

  wrap.innerHTML=
    '<div class="tw"><table><thead>'+
    '<tr><th rowspan="2">\u0939.\u0915\u094D\u0930.</th><th rowspan="2">\u0928\u093E\u0935</th>'+thGroup+'<th rowspan="2">\u090F\u0915\u0942\u0923</th><th rowspan="2">\u0936\u094D\u0930\u0947\u0923\u0940</th></tr>'+
    '<tr>'+thExams+'</tr>'+
    '</thead><tbody>'+rows+'</tbody></table></div>'+
    '<div style="margin-top:10px;display:flex;gap:8px;">'+
    '<button class="btn bp" data-action="saveallmk" data-dummy="saveAllMk(\''+cls+'\',\''+subj+'\')">&#x1F4BE; \u0938\u0930\u094D\u0935 \u0938\u0947\u0935\u094D\u0939 \u0915\u0930\u093E</button>'+
    '</div>';
}

function saveAllMk(cls,subj){
  var stds2=getStds(cls);
  var exams=getExams(cls);
  stds2.forEach(function(s){
    exams.forEach(function(e){
      var inp=document.getElementById('mk-'+s.id+'-'+e.key);
      if(inp)setMk(s.id,cls,subj,e.key,inp.value);
    });
  });
  toast('\u0917\u0941\u0923 \u0938\u0947\u0935\u094D\u0939 \u091D\u093E\u0932\u0947! \u2705');
  syncMks(cls,subj);
}

function loadDescTable(){
  var cls=(document.getElementById('d-cls')||{}).value||'';
  var subj=(document.getElementById('d-subj')||{}).value||'';
  var wrap=document.getElementById('desc-wrap');if(!wrap)return;
  if(!cls||!subj){wrap.innerHTML='';return;}
  var stds2=getStds(cls);
  if(!stds2.length){wrap.innerHTML='<div class="alert aw"><div>\u26A0\uFE0F</div><div>\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940 \u0928\u093E\u0939\u0940\u0924</div></div>';return;}
  var posOpts='<option value="">\u0928\u093F\u0935\u0921\u093E</option>'+DESC_POS.map(function(d){return '<option value="'+d+'">'+d+'</option>';}).join('');
  var impOpts='<option value="">\u0928\u093F\u0935\u0921\u093E</option>'+DESC_IMP.map(function(d){return '<option value="'+d+'">'+d+'</option>';}).join('');
  var rows=stds2.map(function(s){
    var d=getDesc(s.id,cls,subj);
    return '<tr><td><strong>'+s.roll+'</strong></td><td>'+s.name+'</td>'+
      '<td><select id="dp-'+s.id+'" style="width:100%;padding:3px 5px;border:1.5px solid var(--bdr);border-radius:5px;font-family:inherit;font-size:.74rem;" data-action="setdesc">'+posOpts+'</select></td>'+
      '<td><select id="di-'+s.id+'" style="width:100%;padding:3px 5px;border:1.5px solid var(--bdr);border-radius:5px;font-family:inherit;font-size:.74rem;" data-action="setdesc">'+impOpts+'</select></td>'+
      '<td><input type="text" id="dc-'+s.id+'" value="'+(d.custom||'')+'" placeholder="\u0915\u0938\u094D\u091F\u092E \u0928\u094B\u0902\u0926" style="width:100%;padding:3px 6px;border:1.5px solid var(--bdr);border-radius:5px;font-family:inherit;font-size:.74rem;" data-action="setdesc"></td></tr>';
  }).join('');
  // Pre-fill dropdowns
  wrap.innerHTML='<div class="tw"><table><thead><tr><th>\u0939.\u0915\u094D\u0930.</th><th>\u0928\u093E\u0935</th><th>\u0938\u0915\u093E\u0930\u093E\u0924\u094D\u092E\u0915 \u0928\u094B\u0902\u0926</th><th>\u0938\u0941\u0927\u093E\u0930\u0923\u093E\u0924\u094D\u092E\u0915</th><th>\u0915\u0938\u094D\u091F\u092E</th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<button class="btn bp" style="margin-top:9px;" data-action="savealldesc" data-dummy="saveAllDesc(\''+cls+'\',\''+subj+'\')">&#x1F4BE; \u0938\u0930\u094D\u0935 \u0938\u0947\u0935\u094D\u0939</button>';
  // Set existing values
  setTimeout(function(){
    stds2.forEach(function(s){
      var d=getDesc(s.id,cls,subj);
      var dp=document.getElementById('dp-'+s.id);var di=document.getElementById('di-'+s.id);
      if(dp&&d.pos)dp.value=d.pos;
      if(di&&d.imp)di.value=d.imp;
    });
  },80);
}

function saveAllDesc(cls,subj){
  var stds2=getStds(cls);
  stds2.forEach(function(s){
    var dp=document.getElementById('dp-'+s.id);
    var di=document.getElementById('di-'+s.id);
    var dc=document.getElementById('dc-'+s.id);
    setDesc(s.id,cls,subj,{pos:dp?dp.value:'',imp:di?di.value:'',custom:dc?dc.value:''});
  });
  toast('\u0935\u0930\u094D\u0923\u0928\u093E\u0924\u094D\u092E\u0915 \u0928\u094B\u0902\u0926\u0940 \u0938\u0947\u0935\u094D\u0939! \u2705');
}

// ============================================================
// RESULTS - PROGRESS (toppers per class)
// ============================================================
function secRProg(){
  var isA=(curRole==='super'||curRole==='mukh');
  var clsToShow=isA?CLASSES:(curTc&&curTc.classOf?CLASSES.filter(function(c){return c.id===curTc.classOf;}):CLASSES.filter(function(c){return curTc&&curTc.classes.indexOf(c.id)>=0;}));

  var sections=clsToShow.map(function(c){
    var stds2=getStds(c.id);
    if(!stds2.length)return'';
    var subjs=getSubjs(c.id);
    var exams=getExams(c.id);
    var maxPerSubj=exams.reduce(function(s,e){return s+e.max;},0);
    var maxTotal=maxPerSubj*subjs.length;

    var ranked=stds2.map(function(s){
      var total=0;
      subjs.forEach(function(subj){
        exams.forEach(function(exam){
          total+=parseFloat(getMk(s.id,c.id,subj,exam.key))||0;
        });
      });
      var pct=maxTotal>0?Math.round(total/maxTotal*100):0;
      return{id:s.id,name:s.name,roll:s.roll,total:total,pct:pct};
    }).sort(function(a,b){return b.pct-a.pct;});

    var rows=ranked.map(function(s,i){
      var medal=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';
      var barColor=s.pct>=75?'var(--g)':s.pct>=50?'var(--gold)':'var(--r)';
      return '<tr><td>'+(i+1)+'</td><td>'+medal+' <strong>'+s.name+'</strong></td><td>'+s.roll+'</td><td>'+s.pct+'%</td>'+
        '<td style="min-width:80px;"><div class="pbar"><div class="pfill" style="width:'+s.pct+'%;background:'+barColor+';"></div></div></td>'+
        '<td><span class="bdg '+gradeColor(grade(s.pct))+'">'+grade(s.pct)+'</span></td></tr>';
    }).join('');

    return '<div class="card"><div class="ct">\uD83C\uDFC6 '+c.label+' \u2014 \u0935\u0930\u094D\u0917 \u092A\u094D\u0930\u0917\u0924\u0940</div>'+
      '<div class="tw"><table><thead><tr><th>\u0915\u094D\u0930.</th><th>\u0928\u093E\u0935</th><th>\u0939.\u0915\u094D\u0930.</th><th>\u092A\u094D\u0930\u0924\u093F\u0936\u0924</th><th>\u092A\u094D\u0930\u0917\u0924\u0940</th><th>\u0936\u094D\u0930\u0947\u0923\u0940</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }).join('');

  return sections||'<div class="alert ai"><div>\u2139\uFE0F</div><div>\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940 \u0926\u093E\u0924\u093E \u0909\u092A\u0932\u092C\u094D\u0927 \u0928\u093E\u0939\u0940</div></div>';
}

function secRBook(){
  if(curRole!=='super'&&curRole!=='mukh')return noAccess();
  var clsOpts=CLASSES.map(function(c){return '<option value="'+c.id+'">'+c.label+'</option>';}).join('');
  return '<div class="card"><div class="ct">\uD83D\uDCD3 \u0928\u093F\u0915\u093E\u0932 \u092A\u0941\u0938\u094D\u0924\u0915</div>'+
    '<div class="fg2"><div class="fg"><label>\u0935\u0930\u094D\u0917</label><select id="rb-cls""><option value="">\u0928\u093F\u0935\u0921\u093E</option>'+clsOpts+'</select></div></div>'+
    '<div id="rb-wrap"></div></div>';
}

function loadRBook(){
  var cls=(document.getElementById('rb-cls')||{}).value||'';
  var wrap=document.getElementById('rb-wrap');if(!wrap)return;
  if(!cls){wrap.innerHTML='';return;}
  var stds2=getStds(cls);
  if(!stds2.length){wrap.innerHTML='<div class="alert aw"><div>\u26A0;\uFE0F</div><div>\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940 \u0928\u093E\u0939\u0940\u0924</div></div>';return;}
  var subjs=getSubjs(cls);
  var exams=getExams(cls);

  var thSubjs=subjs.map(function(s){return '<th colspan="'+exams.length+'" style="text-align:center;background:var(--d);color:white;font-size:.64rem;">'+s+'</th>';}).join('');
  var thExams=subjs.map(function(){return exams.map(function(e){return '<th style="font-size:.6rem;text-align:center;">'+e.key.toUpperCase()+'</th>';}).join('');}).join('');
  var maxTotal=exams.reduce(function(s,e){return s+e.max;},0)*subjs.length;

  var rows=stds2.map(function(s){
    var total=0;
    var cells=subjs.map(function(subj){
      return exams.map(function(exam){
        var v=getMk(s.id,cls,subj,exam.key);
        total+=parseFloat(v)||0;
        return '<td style="text-align:center;font-size:.72rem;">'+(v||'-')+'</td>';
      }).join('');
    }).join('');
    var pct=maxTotal>0?Math.round(total/maxTotal*100):0;
    var gr=pct>0?grade(pct):'-';
    var pf=pct>=33?'<span class="bdg bgg">\u0909\u0924\u094D\u0924\u0940\u0930\u094D\u0923</span>':'<span class="bdg bgr">\u0905\u0928\u0941\u0924\u094D\u0924\u0940\u0930\u094D\u0923</span>';
    return '<tr><td><strong>'+s.roll+'</strong></td><td style="white-space:nowrap;">'+s.name+'</td>'+cells+'<td style="font-weight:700;text-align:center;">'+pct+'%</td><td style="text-align:center;"><span class="bdg '+gradeColor(gr)+'">'+gr+'</span></td><td>'+pf+'</td></tr>';
  }).join('');

  wrap.innerHTML='<div class="tw" style="font-size:.76rem;"><table><thead><tr><th rowspan="2">\u0939.\u0915\u094D\u0930.</th><th rowspan="2">\u0928\u093E\u0935</th>'+thSubjs+'<th rowspan="2">\u092A\u094D\u0930\u0924\u093F\u0936\u0924</th><th rowspan="2">\u0936\u094D\u0930\u0947\u0923\u0940</th><th rowspan="2">\u0928\u093F\u0915\u093E\u0932</th></tr><tr>'+thExams+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+
    '<button class="btn bp no-print" style="margin-top:10px;" data-action="print">\uD83D\uDDA8\uFE0F \u092A\u094D\u0930\u093F\u0902\u091F</button>';
}

function loadStdsForCard(){
  var cls=(document.getElementById('pc-cls')||{}).value||'';
  var sel=document.getElementById('pc-std');if(!sel)return;
  sel.innerHTML='<option value="">\u0928\u093F\u0935\u0921\u093E</option>';
  getStds(cls).forEach(function(s){var o=document.createElement('option');o.value=s.id;o.textContent=s.roll+' - '+s.name;sel.appendChild(o);});
}

function genCard(){
  var cls=(document.getElementById('pc-cls')||{}).value||'';
  var sId=parseInt((document.getElementById('pc-std')||{}).value)||0;
  var wrap=document.getElementById('pc-wrap');if(!wrap)return;
  if(!cls||!sId){toast('\u0935\u0930\u094D\u0917 \u0935 \u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u0940 \u0928\u093F\u0935\u0921\u093E!','err');return;}
  var s=students.find(function(x){return x.id===sId;});if(!s)return;
  var c=getCls(cls);
  var subjs=getSubjs(cls);
  var exams=getExams(cls);
  var maxPerSubj=exams.reduce(function(x,e){return x+e.max;},0);
  var maxTotal=maxPerSubj*subjs.length;
  var grandTotal=0;

  // Build marks rows
  var groups={};exams.forEach(function(e){groups[e.group]=(groups[e.group]||[]).concat([e]);});
  var groupKeys=[];exams.forEach(function(e){if(groupKeys.indexOf(e.group)<0)groupKeys.push(e.group);});

  var markRows=subjs.map(function(subj){
    var subjTotal=0;
    var cells=exams.map(function(e){
      var v=getMk(sId,cls,subj,e.key);
      subjTotal+=parseFloat(v)||0;
      return '<td>'+(v!==''?v:'-')+'</td>';
    }).join('');
    grandTotal+=subjTotal;
    var pct=maxPerSubj>0?Math.round(subjTotal/maxPerSubj*100):0;
    var gr=pct>0?grade(pct):'-';
    return '<tr><td style="text-align:left;font-weight:600;">'+subj+'</td>'+cells+'<td><strong>'+subjTotal+'</strong></td><td><strong>'+maxPerSubj+'</strong></td><td><span class="bdg '+gradeColor(gr)+'">'+gr+'</span></td></tr>';
  }).join('');

  var totalPct=maxTotal>0?Math.round(grandTotal/maxTotal*100):0;
  var totalGr=totalPct>0?grade(totalPct):'-';
  var pf=totalPct>=33?'\u0909\u0924\u094D\u0924\u0940\u0930\u094D\u0923':'\u0905\u0928\u0941\u0924\u094D\u0924\u0940\u0930\u094D\u0923';

  var examHdrs=exams.map(function(e){return '<th>'+e.label+'<br>/'+e.max+'</th>';}).join('');

  wrap.innerHTML=
    '<div class="pcard-wrap" id="pcard-print">'+
    '<div class="pcard-top">'+
    '<div style="font-size:.7rem;">\u0935\u093F\u0926\u094D\u092F\u093E \u0935\u093F\u0928\u092F\u0928 \u0936\u094B\u092D\u0924\u0947</div>'+
    '<div class="pcard-school">\u0938\u092E\u0924\u093E \u091C\u094B\u0917\u0947\u0936\u094D\u0935\u0930\u0940 \u092E\u0902\u0921\u0933, \u090F\u0930\u0902\u0921\u0917\u093E\u0935 \u091A\u0947</div>'+
    '<div class="pcard-school">\u090F\u0915\u0928\u093E\u0925; \u092E\u093E\u0927\u094D\u092F\u092E\u093F\u0915 \u0935\u093F\u0926\u094D\u092F\u093E\u0932\u092F, \u090F\u0930\u0902\u0921\u0917\u093E\u0935</div>'+
    '<div style="font-size:.7rem;">\u0924;a. \u0936\u0947\u0935;g\u093E\u0935, \u091C\u093F. \u0905\u0939\u093F\u0932\u094D\u092F\u093E\u0928\u0917\u0930</div>'+
    '<div class="pcard-title">\u092A\u094D\u0930\u0917\u0924\u0940\u092A\u0924\u094D\u0930\u0915 \u0938\u0928 2025-2026</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:.75rem;margin-top:5px;">'+
    '<span>\u0939\u091C\u0947\u0930\u0940 \u0915\u094D\u0930.: <strong>'+s.roll+'</strong></span>'+
    '<span>\u0907\u092F\u0924\u094D\u0924\u093E: <strong>'+c.label+'</strong></span>'+
    (s.regNo?'<span>\u0930\u0947\u091C\u093F.\u0928\u0902.: <strong>'+s.regNo+'</strong></span>':'')+'</div>'+
    '</div>'+
    '<div class="pcard-info">'+
    '<div class="pcard-row"><span>\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u094D\u092F\u093E\u091A\u0947 \u0928\u093E\u0935:</span><strong>'+s.name+'</strong></div>'+
    '<div class="pcard-row"><span>\u091C\u0928\u094D\u092E \u0926\u093F.:</span><span>'+(s.dob||'_____')+'</span></div>'+
    '<div class="pcard-row"><span>\u0935\u0921\u093F\u0932\u093E\u0902\u091A\u0947 \u0928\u093E\u0935:</span><span>'+(s.father||'_____')+'</span></div>'+
    '<div class="pcard-row"><span>\u0906\u0908\u091A\u0947 \u0928\u093E\u0935:</span><span>'+(s.mother||'_____')+'</span></div>'+
    '<div class="pcard-row"><span>\u092E\u093E\u0927\u094D\u092F\u092E:</span><span>'+(c.medium||'\u092E\u0930\u093E\u0920\u0940')+'</span></div>'+
    '<div class="pcard-row"><span>\u0926\u0942\u0930\u0927\u094D\u0935\u0928\u0940:</span><span>'+(s.phone||'_____')+'</span></div>'+
    '</div>'+
    '<div style="padding:6px 8px;border-bottom:1px solid #000;"><strong style="font-size:.78rem;">\u2730 \u0917\u0941\u0923\u0924\u0915\u094D\u0924\u093E / Marksheet</strong></div>'+
    '<div style="overflow-x:auto;"><table class="pcard-marks"><thead><tr><th style="text-align:left;">\u0935\u093F\u0937\u092F</th>'+examHdrs+'<th>\u090F\u0915\u0942\u0923</th><th>\u0935\u0930\u0940\u0932</th><th>\u0936\u094D\u0930\u0947\u0923\u0940</th></tr></thead><tbody>'+
    markRows+
    '<tr style="background:#F8F8F8;font-weight:700;"><td>\u090F\u0915\u0942\u0923</td>'+exams.map(function(){return '<td>-</td>';}).join('')+'<td>'+grandTotal+'</td><td>'+maxTotal+'</td><td><span class="bdg '+gradeColor(totalGr)+'">'+totalGr+'</span></td></tr>'+
    '</tbody></table></div>'+
    '<div style="padding:6px 8px;font-size:.76rem;"><strong>\u0928\u093F\u0915\u093E\u0932: <span style="color:'+(pf==='\u0909\u0924\u094D\u0924\u0940\u0930\u094D\u0923'?'green':'red')+'">'+pf+'</span></strong> &nbsp; \u0915\u0942\u0932 \u0936\u094D\u0930\u0947\u0923\u0940: <strong>'+totalGr+'</strong> &nbsp; \u092A\u094D\u0930\u0924\u093F\u0936\u0924: <strong>'+totalPct+'%</strong></div>'+

function sheetPost(name,rows,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('POST',SURL,true);
  xhr.setRequestHeader('Content-Type','text/plain');
  xhr.onreadystatechange=function(){if(xhr.readyState===4&&cb)cb();};
  xhr.onerror=function(){syncStatus('err');};
  xhr.send(JSON.stringify({action:'write',sheet:name,rows:rows}));
}
function sheetGet(name,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',SURL+'?sheet='+encodeURIComponent(name),true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4){try{cb(JSON.parse(xhr.responseText).rows||[]);}catch(e){cb([]);}}
  };
  xhr.onerror=function(){cb([]);};
  xhr.send();
}

function syncAll(){
  syncStatus('ing');
  var bR=[['ID','Title','Author','Subject','Copies']];
  books.forEach(function(b){bR.push([b.id,b.title,b.author||'',b.subject,b.copies]);});
  var sR=[['ID','Name','Class','Roll','Status','Reason','Father','Mother','DOB','Phone','RegNo']];
  students.forEach(function(s){sR.push([s.id,s.name,s.cls,s.roll||'',s.status,s.reason||'',s.father||'',s.mother||'',s.dob||'',s.phone||'',s.regNo||'']);});
  var tR=[['ID','SName','Class','BTitle','Subj','IDate','RDate','Due','TId','TName','RetTName']];
  transactions.forEach(function(t){tR.push([t.id,t.sName,t.cls,t.bTitle,t.subj||'',t.issueDate,t.retDate||'',t.due,t.tId||'',t.tName||'',t.retTName||'']);});
  var pwR=[['key','value'],['super',PW.super],['mukh',PW.mukh]];
  var tcR=[['ID','Name','PW','ClassOf','Subjects','Classes']];
  TEACHERS.forEach(function(tc){tcR.push([tc.id,tc.name,tc.pw,tc.classOf||'',tc.subjects.join('|'),tc.classes.join('|')]);});

  sheetPost('pustake',bR,function(){sheetPost('vidyarthi',sR,function(){sheetPost('vyavhar',tR,function(){sheetPost('passwords',pwR,function(){sheetPost('shikshak',tcR,function(){syncStatus('ok');});});});});});
}

function syncMks(cls,subj){
  syncStatus('ing');
  var rows=[['sId','subj','cls']];
  var exams=getExams(cls);
  rows[0]=rows[0].concat(exams.map(function(e){return e.key;}));
  getStds(cls).forEach(function(s){
    var row=[s.id,subj,cls];
    exams.forEach(function(e){row.push(getMk(s.id,cls,subj,e.key));});
    rows.push(row);
  });
  var shName='marks_'+cls+'_'+subj.replace(/\s/g,'_').replace(/[^a-zA-Z0-9_\u0900-\u097F]/g,'');
  sheetPost(shName,rows,function(){syncStatus('ok');});
}

function syncSettings(){
  var sr=[['key','value'],['marksLocked',settings.marksLocked?'1':'0']];
  sheetPost('settings',sr,null);
}

function parseClass(raw){
  if(!raw)return'';
  var s=String(raw).trim();
  if(s.match(/^10/))return'10';
  if(s.match(/^9/))return'9';
  if(s.match(/^8/))return'8';
  if(s.match(/7.*\u0905/))return'7a';
  if(s.match(/7.*\u092C/))return'7b';
  if(s.match(/^7/))return'7b';
  if(s.match(/6.*\u0905/))return'6a';
  if(s.match(/6.*\u092C/))return'6b';
  if(s.match(/^6/))return'6b';
  if(s.match(/5.*\u0905/))return'5a';
  if(s.match(/5.*\u092C/))return'5b';
  if(s.match(/^5/))return'5b';
  return s;
}

function loadAll(){
  syncStatus('ing');
  sheetGet('pustake',function(bR){
    if(bR.length>1){
      books=bR.slice(1).filter(function(r){return r[0];}).map(function(r){return{id:parseInt(r[0])||1,title:String(r[1]||''),author:String(r[2]||''),subject:String(r[3]||''),copies:parseInt(r[4])||1};});
      nextBId=books.length?Math.max.apply(null,books.map(function(b){return b.id;}))+1:6;
    }
    function parseStudents(sR){
      if(sR.length<2)return;
      var header=sR[0].map(function(h){return String(h||'').trim();});
      var isKishorFormat=(header[0]==='\u0907\u092F\u0924\u094D\u0924\u093E'||header[0].indexOf('\u0907\u092F\u0924\u094D\u0924\u093E')>=0);
      if(isKishorFormat){
        var idC=1;
        students=sR.slice(1).filter(function(r){return r[0]||r[2];}).map(function(r){
          return{id:idC++,name:String(r[2]||''),cls:parseClass(r[0]),roll:String(r[1]||''),status:'active',reason:'',father:'',mother:String(r[3]||''),dob:String(r[5]||''),phone:'',regNo:String(r[6]||''),medium:String(r[4]||'')};
        });
      } else {
        students=sR.slice(1).filter(function(r){return r[0];}).map(function(r){
          return{id:parseInt(r[0])||1,name:String(r[1]||''),cls:String(r[2]||''),roll:String(r[3]||''),status:String(r[4]||'active'),reason:String(r[5]||''),father:String(r[6]||''),mother:String(r[7]||''),dob:String(r[8]||''),phone:String(r[9]||''),regNo:String(r[10]||'')};
        });
      }
      nextSId=students.length+1;
    }
    function afterStudents(){
      sheetGet('vyavhar',function(tR){
        if(tR.length>1){
          transactions=tR.slice(1).filter(function(r){return r[0];}).map(function(r){return{id:parseInt(r[0])||1,sId:null,sName:String(r[1]||''),cls:String(r[2]||''),bId:null,bTitle:String(r[3]||''),subj:String(r[4]||''),issueDate:String(r[5]||''),retDate:r[6]||null,due:String(r[7]||''),tId:parseInt(r[8])||null,tName:r[9]||null,retTName:r[10]||null};});
          nextTxId=transactions.length?Math.max.apply(null,transactions.map(function(t){return t.id;}))+1:1;
        }
        sheetGet('passwords',function(pwR){
          if(pwR.length>1){pwR.slice(1).forEach(function(r){if(r[0]&&r[1])PW[String(r[0])]=String(r[1]);});}
          sheetGet('settings',function(sr){
            if(sr.length>1){sr.slice(1).forEach(function(r){if(r[0]==='marksLocked')settings.marksLocked=(r[1]==='1');});}
            syncStatus('ok');
          });
        });
      });
    }
    sheetGet('Students',function(sR){
      if(sR.length>1){parseStudents(sR);afterStudents();}
      else{sheetGet('vidyarthi',function(sR2){parseStudents(sR2);afterStudents();});}
    });
  });
}

function parseShikshakRows(rows){
  if(rows.length<2)return;
  var loaded=rows.slice(1).filter(function(r){return r[0];}).map(function(r){
    var subjs=String(r[4]||'').split('|').filter(Boolean);
    var cls=String(r[5]||'').split('|').filter(Boolean);
    var classOf=String(r[3]||'');
    return{id:parseInt(r[0])||0,name:String(r[1]||''),pw:String(r[2]||''),classOf:classOf,subjects:subjs,classes:cls,isMukh:(classOf===''&&cls.length===0)};
  });
  if(loaded.length>0)TEACHERS=loaded;
}

function loadShikshakFirst(){
  sheetGet('Shikshak',function(rows){
    parseShikshakRows(rows);
    loadAll();
  });
}

function loadShikshak(){

}
