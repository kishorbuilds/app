<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EMVE - एकनाथ माध्यमिक विद्यालय</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f2f5;--card:#fff;--pri:#1a5276;--pri2:#2980b9;--red:#e74c3c;--grn:#27ae60;--wrn:#f39c12;--txt:#2c3e50;--txt2:#7f8c8d;--bdr:#dce1e6;--sh:0 2px 8px rgba(0,0,0,.08);--r:8px;--nh:52px;--sw:210px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Devanagari',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
button,select,input{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;border-radius:var(--r);padding:8px 16px;transition:all .2s}
input,select{border:1px solid var(--bdr);border-radius:var(--r);padding:8px 12px;outline:none}
input:focus,select:focus{border-color:var(--pri2);box-shadow:0 0 0 2px rgba(41,128,185,.15)}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid var(--bdr);padding:5px 7px;text-align:center;font-size:13px}
th{background:var(--pri);color:#fff;font-weight:600;position:sticky;top:0;z-index:2}
.btn{background:var(--pri);color:#fff;font-weight:600}.btn:hover{background:var(--pri2)}
.btn-d{background:var(--red);color:#fff}.btn-s{background:var(--grn);color:#fff}
.btn-w{background:var(--wrn);color:#fff}.btn-sm{padding:4px 10px;font-size:12px}
.hid{display:none!important}
.toast{position:fixed;bottom:20px;right:20px;background:#333;color:#fff;padding:12px 20px;border-radius:var(--r);z-index:9999;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-r{background:#fde8e8;color:var(--red)}.badge-g{background:#e8f8e8;color:var(--grn)}.badge-b{background:#e8f0f8;color:var(--pri2)}
.mo{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.md{background:#fff;border-radius:12px;padding:24px;max-width:520px;width:92%;max-height:85vh;overflow-y:auto}
.md h3{margin-bottom:14px}.fr{margin-bottom:10px}.fr label{display:block;font-weight:600;margin-bottom:3px;font-size:13px}
.fr input,.fr select{width:100%}
.sp{display:inline-block;width:20px;height:20px;border:3px solid var(--bdr);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a5276,#2980b9)}
.lb{background:#fff;border-radius:16px;padding:36px;width:350px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.lb h1{color:var(--pri);font-size:20px;margin-bottom:2px}.lb h2{color:var(--txt2);font-size:13px;font-weight:400;margin-bottom:20px}
.lb input{width:100%;margin-bottom:10px;padding:11px;font-size:14px}.lb button{width:100%;padding:11px;font-size:15px}
.le{color:var(--red);font-size:13px;margin-top:6px;min-height:18px}

#topNav{position:fixed;top:0;left:0;width:100%;height:var(--nh);background:var(--pri);color:#fff;display:flex;align-items:center;padding:0 14px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
#topNav .nt{font-size:15px;font-weight:700;flex:1}
#topNav .nu{font-size:12px;margin-right:10px;opacity:.85}
.si{font-size:16px;margin-right:10px;cursor:pointer}
.hb{display:none;background:none;color:#fff;font-size:22px;margin-right:10px;padding:2px}

#sidebar{position:fixed;top:var(--nh);left:0;width:var(--sw);height:calc(100vh - var(--nh));background:#fff;border-right:1px solid var(--bdr);overflow-y:auto;z-index:90}
.ss{padding:10px 0;border-bottom:1px solid var(--bdr)}
.st{padding:3px 14px;font-size:10px;text-transform:uppercase;color:var(--txt2);font-weight:700;letter-spacing:.5px}
.si2{padding:9px 14px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:background .15s}
.si2:hover{background:var(--bg)}.si2.ac{background:#e8f4fd;color:var(--pri);font-weight:600;border-right:3px solid var(--pri)}

#mainContent{margin-top:var(--nh);margin-left:var(--sw);padding:16px;min-height:calc(100vh - var(--nh))}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}.ph h2{font-size:18px}
.cd{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:14px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.sc{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--sh);text-align:center}
.sc .sn{font-size:26px;font-weight:700;color:var(--pri)}.sc .sl{font-size:11px;color:var(--txt2);margin-top:2px}
.tw{overflow-x:auto;max-height:65vh;overflow-y:auto}

@media(max-width:768px){
  #sidebar{display:none}#sidebar.open{display:block;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.2)}
  #mainContent{margin-left:0;padding:10px}.sg{grid-template-columns:1fr 1fr}.hb{display:block!important}
}
@media print{
  #topNav,#sidebar,.no-p{display:none!important}#mainContent{margin:0;padding:0}body{font-size:11px}
  th{background:#333!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="lb">
    <h1>एकनाथ माध्यमिक विद्यालय</h1>
    <h2>एरंडगाव, ता. सिल्लोड, जि. छत्रपती संभाजीनगर</h2>
    <input type="text" id="loginUser" placeholder="वापरकर्ता नाव (उदा. ranasing)">
    <input type="password" id="loginPass" placeholder="पासवर्ड (उदा. ranasing@2025)">
    <button class="btn" data-action="doLogin">प्रवेश करा</button>
    <div class="le" id="loginErr"></div>
  </div>
</div>

<div id="topNav" class="hid">
  <button class="hb" data-action="toggleSB">&#9776;</button>
  <div class="nt">EMVE शाळा व्यवस्थापन</div>
  <span class="si" data-action="syncAll" title="Sync">&#x2601;</span>
  <span class="nu" id="navUser"></span>
  <button class="btn-sm btn-d" data-action="logout">बाहेर</button>
</div>

<div id="sidebar" class="hid">
  <div class="ss" id="sL">
    <div class="st">ग्रंथालय</div>
    <div class="si2" data-page="libDash">डॅशबोर्ड</div>
    <div class="si2" data-page="libIssue">पुस्तक द्या</div>
    <div class="si2" data-page="libReturn">परत</div>
    <div class="si2" data-page="libCat">ग्रंथसूची</div>
    <div class="si2" data-page="libRpt">अहवाल</div>
  </div>
  <div class="ss" id="sR">
    <div class="st">निकाल</div>
    <div class="si2" data-page="resDash">डॅशबोर्ड</div>
    <div class="si2" data-page="resMarks">गुण नोंदणी</div>
    <div class="si2" data-page="resSheet">निकालपत्रक</div>
    <div class="si2" data-page="resGosG">गोषवारा श्रेणी</div>
    <div class="si2" data-page="resGosC">गोषवारा जातनिहाय</div>
    <div class="si2" data-page="resGC">श्रेणी पत्रक</div>
    <div class="si2" data-page="resProg">प्रगतीपत्रक</div>
  </div>
  <div class="ss hid" id="sA">
    <div class="st">व्यवस्थापन</div>
    <div class="si2" data-page="admSt">विद्यार्थी</div>
    <div class="si2" data-page="admTch">शिक्षक</div>
    <div class="si2" data-page="admPw">पासवर्ड</div>
    <div class="si2" data-page="admLock">गुण नियंत्रण</div>
    <div class="si2" data-page="admProm">प्रमोट</div>
  </div>
</div>

<div id="mainContent" class="hid"><div id="pc"></div></div>

<script>
(function(){
"use strict";
var API="https://script.google.com/macros/s/AKfycbzDPkJF7VI53PYTE4T1PmAAlU4jFtzTN1zjRi8V9Wz1-SsQySly6NNfpO1-gmMc4SbOdA/exec";
var SCH="\u090F\u0915\u0928\u093E\u0925 \u092E\u093E\u0927\u094D\u092F\u092E\u093F\u0915 \u0935\u093F\u0926\u094D\u092F\u093E\u0932\u092F, \u090F\u0930\u0902\u0921\u0917\u093E\u0935";
var S5=["\u092E\u0930\u093E\u0920\u0940","\u0939\u093F\u0902\u0926\u0940","\u0907\u0902\u0917\u094D\u0930\u091C\u0940","\u0917\u0923\u093F\u0924","\u092A\u0930\u093F\u0938\u0930 \u0905\u092D\u094D\u092F\u093E\u0938","\u0915\u0932\u093E","\u0915\u093E\u0930\u094D\u092F\u093E\u0928\u0941\u092D\u0935","\u0936\u093E.\u0936\u093F\u0915\u094D\u0937\u0923"];
var S68=["\u092E\u0930\u093E\u0920\u0940","\u0939\u093F\u0902\u0926\u0940","\u0907\u0902\u0917\u094D\u0930\u091C\u0940","\u0917\u0923\u093F\u0924","\u0935\u093F\u091C\u094D\u091E\u093E\u0928","\u0938\u092E\u093E\u091C \u0936\u093E\u0938\u094D\u0930","\u0915\u0932\u093E","\u0915\u093E\u0930\u094D\u092F\u093E\u0928\u0941\u092D\u0935","\u0936\u093E.\u0936\u093F\u0915\u094D\u0937\u0923"];
var S910=["\u092E\u0930\u093E\u0920\u0940","\u0939\u093F\u0902\u0926\u0940","\u0907\u0902\u0917\u094D\u0930\u091C\u0940","\u0917\u0923\u093F\u0924","\u0935\u093F\u091C\u094D\u091E\u093E\u0928","\u0938\u092E\u093E\u091C \u0936\u093E\u0938\u094D\u0930"];
var GC=[{c:"\u0905-1",n:91,x:100},{c:"\u0905-2",n:81,x:90},{c:"\u092C-1",n:71,x:80},{c:"\u092C-2",n:61,x:70},{c:"\u0915-1",n:51,x:60},{c:"\u0915-2",n:41,x:50},{c:"\u0921",n:33,x:40},{c:"\u0907-1",n:21,x:32},{c:"\u0907-2",n:0,x:20}];
var GH=[{c:"A",n:75,x:100},{c:"B",n:60,x:74},{c:"C",n:35,x:59},{c:"D",n:0,x:34}];
var CASTES=["S.C.","S.T.","N.T.","V.J.N.T.","S.B.C.","O.B.C.","OPEN","MINOR"];
var CO=["10","9","8","7a","7b","6a","6b","5a","5b"];
var CL={"10":"१० वी","9":"९ वी","8":"८ वी","7a":"७ वी अ","7b":"७ वी ब","6a":"६ वी अ","6b":"६ वी ब","5a":"५ वी अ","5b":"५ वी ब"};

var U=null,students=[],teachers=[],books=[],txns=[],MD={},settings={marksLocked:false,marksEntryOpen:true},curPage="";

function pC(raw){var o=String(raw).trim(),d=o.replace(/[^0-9]/g,""),a=o.indexOf("\u0905")>=0||/a/i.test(o);if(d==="10")return"10";if(d==="9")return"9";if(d==="8")return"8";if(d==="7")return a?"7a":"7b";if(d==="6")return a?"6a":"6b";if(d==="5")return a?"5a":"5b";return d||o.toLowerCase();}
function cT(c){return parseInt(c)>=9?"high":"mid";}
function gS(c){var d=parseInt(c);return d>=9?S910:d>=6?S68:S5;}
function gG(p,c){var gs=cT(c)==="high"?GH:GC;var v=Math.round(p);for(var i=0;i<gs.length;i++)if(v>=gs[i].n&&v<=gs[i].x)return gs[i].c;return"-";}
function fmt(v){if(!v)return"";var s=String(v);return s.indexOf("T")>0?s.split("T")[0]:s;}
function today(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function $(id){return document.getElementById(id);}

function aG(sh){return fetch(API+"?sheet="+encodeURIComponent(sh)).then(function(r){return r.json()}).then(function(d){return d.rows||[]});}
function aP(sh,rows){return fetch(API,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({sheet:sh,action:"write",rows:rows})}).then(function(r){return r.json()});}
function toast(m,d){var e=document.createElement("div");e.className="toast";e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},d||2500);}

function loadAll(cb){
  var n=0,t=5;function ck(){n++;if(n>=t&&cb)cb();}
  aG("Shikshak").then(function(R){teachers=[];for(var i=1;i<R.length;i++){var r=R[i];if(!r[0])continue;teachers.push({id:String(r[0]),name:r[1]||"",pw:r[2]||"",classOf:r[3]||"",subjects:(r[4]||"").split("|").map(function(s){return s.trim()}).filter(Boolean),classes:(r[5]||"").split("|").map(function(s){return s.trim()}).filter(Boolean)});}ck();}).catch(ck);
  aG("Students").then(function(R){students=[];for(var i=1;i<R.length;i++){var r=R[i];if(!r[2])continue;students.push({iy:pC(r[0]),hk:r[1]||"",nm:String(r[2]||"").trim(),mo:r[3]||"",md:r[4]||"",db:fmt(r[5]),rg:r[6]||"",gn:r[7]||"",cs:r[8]||""});}ck();}).catch(function(){aG("vidyarthi").then(function(R){students=[];for(var i=1;i<R.length;i++){var r=R[i];if(!r[2])continue;students.push({iy:pC(r[0]),hk:r[1]||"",nm:String(r[2]||"").trim(),mo:r[3]||"",md:r[4]||"",db:fmt(r[5]),rg:r[6]||"",gn:r[7]||"",cs:r[8]||""});}ck();}).catch(ck);});
  aG("pustake").then(function(R){books=[];for(var i=1;i<R.length;i++){var r=R[i];if(!r[0])continue;books.push({id:String(r[0]),ti:r[1]||"",au:r[2]||"",ca:r[3]||"",qt:Number(r[4])||1});}ck();}).catch(ck);
  aG("vyavhar").then(function(R){txns=[];for(var i=1;i<R.length;i++){var r=R[i];if(!r[0])continue;txns.push({bi:String(r[0]),bt:r[1]||"",sn:r[2]||"",sc:r[3]||"",id:fmt(r[4]),rd:fmt(r[5]),mv:r[6]||"",rt:r[7]||"",st:r[8]||"\u0926\u093F\u0932\u0947\u0932\u0947"});}ck();}).catch(ck);
  aG("settings").then(function(R){if(R.length>1)for(var i=1;i<R.length;i++){if(R[i][0]==="marksLocked")settings.marksLocked=R[i][1]==="true"||R[i][1]===true;if(R[i][0]==="marksEntryOpen")settings.marksEntryOpen=R[i][1]==="true"||R[i][1]===true;}ck();}).catch(ck);
}

function lM(c,s,cb){var k="marks_"+c+"_"+s;aG(k).then(function(R){MD[k]=R;if(cb)cb(R);}).catch(function(){MD[k]=[];if(cb)cb([]);});}
function lAM(c,cb){var ss=gS(c),n=0;if(!ss.length){if(cb)cb();return;}ss.forEach(function(s){lM(c,s,function(){n++;if(n>=ss.length&&cb)cb();});});}
function sM(c,s,rows,cb){var k="marks_"+c+"_"+s;aP(k,rows).then(function(){MD[k]=rows;if(cb)cb();}).catch(function(){toast("सेव्ह अयशस्वी!");});}
function saveSt(cb){var R=[["\u0907\u092F\u0924\u094D\u0924\u093E","\u0939.\u0915\u094D\u0930.","\u0935\u093F\u0926\u094D\u092F\u093E\u0930\u094D\u0925\u093E\u091A\u0947 \u0928\u093E\u0935","\u0906\u0908\u091A\u0947 \u0928\u093E\u0935","\u092E\u093E\u0927\u094D\u092F\u092E","\u091C\u0928\u094D\u092E \u0924\u093E\u0930\u0940\u0916","\u0928\u094B\u0902\u0926\u0923\u0940 \u0915\u094D\u0930\u092E\u093E\u0902\u0915","\u0932\u093F\u0902\u0917","\u091C\u093E\u0924"]];students.forEach(function(s){R.push([CL[s.iy]||s.iy,s.hk,s.nm,s.mo,s.md,s.db,s.rg,s.gn,s.cs]);});aP("Students",R).then(function(){if(cb)cb();}).catch(function(){toast("Save failed!");});}
function saveTch(cb){var R=[["ID","Name","PW","ClassOf","Subjects","Classes"]];teachers.forEach(function(t){R.push([t.id,t.name,t.pw,t.classOf,t.subjects.join("|"),t.classes.join("|")]);});aP("Shikshak",R).then(function(){if(cb)cb();}).catch(function(){toast("Save failed!");});}
function saveTx(cb){var R=[["BookID","BookTitle","StudentName","StudentClass","IssueDate","ReturnDate","Motivator","ReturnTeacher","Status"]];txns.forEach(function(t){R.push([t.bi,t.bt,t.sn,t.sc,t.id,t.rd,t.mv,t.rt,t.st]);});aP("vyavhar",R).then(function(){if(cb)cb();}).catch(function(){toast("Save failed!");});}
function saveBk(cb){var R=[["ID","Title","Author","Category","Qty"]];books.forEach(function(b){R.push([b.id,b.ti,b.au,b.ca,b.qt]);});aP("pustake",R).then(function(){if(cb)cb();}).catch(function(){toast("Save failed!");});}
function saveSett(cb){aP("settings",[["key","value"],["marksLocked",String(settings.marksLocked)],["marksEntryOpen",String(settings.marksEntryOpen)]]).then(function(){if(cb)cb();}).catch(function(){});}

function doLogin(){
  var un=$("loginUser").value.trim(),pw=$("loginPass").value.trim(),er=$("loginErr");
  if(!un||!pw){er.textContent="\u0915\u0943\u092A\u092F\u093E \u0926\u094B\u0928\u094D\u0939\u0940 \u092D\u0930\u093E";return;}
  er.innerHTML='<span class="sp"></span> \u0924\u092A\u093E\u0938\u0924 \u0906\u0939\u0947...';
  aG("passwords").then(function(R){
    var found=false;
    for(var i=1;i<R.length;i++){
      if(R[i][0]===un&&R[i][1]===pw){
        found=true;
        if(un==="samata")U={id:"admin",name:"\u0938\u0902\u0938\u094D\u0925\u093E\u091A\u093E\u0932\u0915",role:"super",co:"",su:[],cl:CO.slice()};
        else if(un==="katemadhav")U={id:"hm",name:"\u092E\u0941\u0916\u094D\u092F\u093E\u0927\u094D\u092F\u093E\u092A\u0915",role:"hm",co:"",su:[],cl:CO.slice()};
        break;
      }
    }
    if(!found){
      for(var j=0;j<teachers.length;j++){
        var t=teachers[j],tid=t.pw.split("@")[0];
        if((tid===un&&t.pw===pw)||(t.pw===pw&&t.pw.split("@")[0]===un)){
          found=true;U={id:t.id,name:t.name,role:"teacher",co:t.classOf,su:t.subjects,cl:t.classes};break;
        }
      }
    }
    if(!found){er.textContent="\u091A\u0941\u0915\u0940\u091A\u0947 \u0928\u093E\u0935/\u092A\u093E\u0938\u0935\u0930\u094D\u0921!";return;}
    enterApp();
  }).catch(function(){
    for(var j=0;j<teachers.length;j++){var t=teachers[j];if(t.pw===pw||t.pw===un+"@"+pw.split("@").pop()){U={id:t.id,name:t.name,role:"teacher",co:t.classOf,su:t.subjects,cl:t.classes};enterApp();return;}}
    er.textContent="\u0938\u0930\u094D\u0935\u094D\u0939\u0930 \u0924\u094D\u0930\u0941\u091F\u0940!";
  });
}
function enterApp(){
  $("loginScreen").classList.add("hid");$("topNav").classList.remove("hid");$("sidebar").classList.remove("hid");$("mainContent").classList.remove("hid");
  $("navUser").textContent=U.name;
  if(U.role==="super"||U.role==="hm")$("sA").classList.remove("hid");
  sP("resDash");
}
function logout(){U=null;$("loginScreen").classList.remove("hid");$("topNav").classList.add("hid");$("sidebar").classList.add("hid");$("mainContent").classList.add("hid");$("loginUser").value="";$("loginPass").value="";$("loginErr").textContent="";}
