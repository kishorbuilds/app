<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>EMVE School App</title>
<style>
:root{
  --s:#d97706; --s2:#b45309; --d:#0f172a; --d2:#1e293b; --g:#15803d; --g2:#166534; --r:#dc2626; --b:#2563eb; --gold:#d97706; --pur:#7c3aed; --bg:#f8fafc; --card:#ffffff; --bdr:#e2e8f0; --mt:#475569;
  --sh:0 10px 25px -5px rgba(0,0,0,.05); --shl:0 20px 25px -5px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); background-attachment: fixed; color:var(--d); min-height:100vh; font-size:15px; overflow-x:hidden;}
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg, #1e293b 0%, #0f172a 100%);padding:16px;}
.lbox{background:var(--card);border-radius:24px;padding:40px 24px;width:100%;max-width:400px;box-shadow:var(--shl);}
.lemb{width:85px;height:85px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.lschool{font-size:1.3rem;font-weight:900;color:var(--d);line-height:1.4;margin:6px 0;}
.lsub{font-size:.9rem;color:var(--mt);font-weight:600;}
.llib{font-size:.9rem;font-weight:800;color:var(--s);background:#fffbeb;padding:8px 16px;border-radius:10px;border-left:4px solid var(--s);display:inline-block;margin-top:12px;}
.lf label{display:block;font-size:.85rem;font-weight:800;color:var(--mt);margin-bottom:6px;text-transform:uppercase;margin-top:20px;}
.lf select,.lf input{width:100%;padding:14px 16px;border:2px solid var(--bdr);border-radius:12px;font-family:inherit;font-size:1.05rem;background:#f8fafc;}
.lf select:focus,.lf input:focus{outline:none;border-color:var(--s);background:#FFF;box-shadow:0 0 0 4px rgba(217,119,6,.15);}
.lbtn{width:100%;padding:16px;background:linear-gradient(135deg,var(--s),var(--s2));color:#fff;border:none;border-radius:14px;font-family:inherit;font-size:1.15rem;font-weight:800;cursor:pointer;margin-top:28px;}
#app{display:none;}
header{background:linear-gradient(90deg, #1e293b 0%, #3b82f6 100%);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 4px 15px rgba(0,0,0,.15);}
.hi{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;max-width:1400px;margin:0 auto;}
.hl{display:flex;align-items:center;gap:12px;}
.hico{width:50px;height:50px;background:#fff;border-radius:8px;padding:2px;}
.htop{font-size:.7rem;opacity:.9;font-weight:700;}
.hmain{font-size:1.25rem;font-weight:900;}
.hr{display:flex;align-items:center;gap:10px;}
.ubdg{background:rgba(255,255,255,.2);border-radius:24px;padding:6px 14px;font-size:.9rem;font-weight:700;}
.sbtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:10px;cursor:pointer;font-weight:800;}
.modules{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px;margin:30px auto;padding:0 20px;}
.mcard{background:rgba(255, 255, 255, 0.95);border-radius:24px;padding:32px 20px;text-align:center;cursor:pointer;box-shadow:var(--sh);border:1px solid rgba(255,255,255,0.5);}
.micon{font-size:3rem;margin-bottom:16px;}
.mtit{font-size:1.2rem;font-weight:900;}
.mdesc{font-size:.9rem;color:var(--mt);margin-top:6px;}
nav{background:rgba(255, 255, 255, 0.95);border-bottom:1px solid var(--bdr);overflow-x:auto;white-space:nowrap;}
.ni{display:flex;max-width:1400px;margin:0 auto;padding:0 10px;}
.tab{padding:16px 20px;cursor:pointer;font-size:1rem;font-weight:800;color:var(--mt);border-bottom:4px solid transparent;display:inline-block;}
.tab.on{color:var(--b);border-bottom-color:var(--b);}
main{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:#fff;border-radius:24px;padding:28px;box-shadow:var(--sh);margin-bottom:24px;}
.ct{font-size:1.2rem;font-weight:900;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--bdr);}
.bbtn{margin-bottom:20px;padding:12px 20px;background:#fff;border:2px solid var(--bdr);border-radius:14px;cursor:pointer;font-weight:800;}
.fg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:20px;}
.fg label{display:block;font-size:.85rem;font-weight:800;color:var(--mt);margin-bottom:8px;}
.fg input,.fg select{width:100%;padding:14px 16px;border:2px solid var(--bdr);border-radius:12px;font-size:1.05rem;background:#f8fafc;}
.btn{padding:12px 24px;border:none;border-radius:14px;font-weight:800;cursor:pointer;}
.bp{background:var(--b);color:#fff;}
.bs{background:var(--g);color:#fff;}
.bd{background:var(--r);color:#fff;}
.tw{width:100%;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:max-content;}
th{background:#f8fafc;padding:14px 16px;text-align:left;font-size:.85rem;font-weight:800;color:var(--mt);border-bottom:3px solid var(--bdr);}
td{padding:14px 16px;border-bottom:1px solid var(--bdr);font-size:.95rem;font-weight:600;}
.bdg{padding:6px 12px;border-radius:24px;font-size:.8rem;font-weight:800;}
.bgg{background:#dcfce7;color:var(--g);}.bgr{background:#fee2e2;color:var(--r);}.bgb{background:#dbeafe;color:var(--b);}
.alert{border-radius:16px;padding:16px 24px;margin-bottom:24px;background:#fff7ed;border:2px solid #fdba74;color:#9a3412;font-weight:700;}
.mov{position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:500;display:none;align-items:center;justify-content:center;}
.mov.op{display:flex;}
.mbox{background:var(--card);border-radius:24px;padding:30px;max-width:500px;width:100%;}
#toast{position:fixed;bottom:30px;right:24px;background:var(--d);color:#fff;padding:16px 28px;border-radius:16px;font-weight:800;transform:translateY(150px);opacity:0;transition:all .4s;z-index:999;}
#toast.show{transform:translateY(0);opacity:1;}
.dhero{background:linear-gradient(135deg, #1e293b 0%, #4338ca 100%);border-radius:24px;padding:36px 30px;color:#fff;margin-bottom:24px;}
.tt-grid{display:grid;border:2px solid var(--bdr);border-radius:12px;background:#fff;}
.tt-hdr{background:var(--d);color:#fff;padding:10px;font-size:.8rem;font-weight:800;text-align:center;}
.tt-cell{padding:8px;border-bottom:1px solid var(--bdr);border-right:1px solid var(--bdr);font-size:.85rem;min-height:64px;}
.tt-period{background:#f8fafc;font-weight:900;}

/* PRINT STYLES - SINGLE PAGE FIX & NATIVE PREVIEW */
#print-area { display: none; }
@media print {
  body * { visibility: hidden; }
  body, html { margin: 0; padding: 0; background: #fff; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; }
}
</style>
</head>
<body>
<div id="print-area"></div>

<div id="login-screen">
  <div style="width:100%;max-width:420px;padding:16px;">
    <div class="lbox">
      <div style="text-align:center;margin-bottom:30px;">
        <div class="lemb"><img src="Saraswati Logo.jpg" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'"></div>
        <div class="lsub">समता जोगेश्वरी मंडळाचे</div>
        <div class="lschool">एकनाथ माध्यमिक विद्यालय, एरंडगाव</div>
        <div class="lsub" style="margin-top:4px;">ता. शेवगाव, जि. अहिल्यानगर</div>
      </div>
      <div class="lf">
        <label>भूमिका (Role)</label>
        <select id="l-role" data-field="role">
          <option value="">-- भूमिका निवडा --</option>
          <option value="admin">🛡️ प्रशासन (Administration)</option>
          <option value="shik">&#x1F535; शिक्षक (Teacher)</option>
        </select>
        <div id="admin-sel" style="display:none;margin-top:16px;">
          <label>प्रशासकीय पद</label>
          <select id="l-admin-role">
            <option value="">-- पद निवडा --</option>
            <option value="super">&#x1F534; संस्थाचालक</option>
            <option value="mukh">&#x1F7E2; मुख्याध्यापक</option>
            <option value="clerk">🟠 लिपिक (Clerk)</option>
          </select>
        </div>
        <div id="tc-sel" style="display:none;margin-top:16px;">
          <label>शिक्षक निवडा</label>
          <select id="l-tc"><option value="">&#x2014; निवड &#x2014;</option></select>
        </div>
        <label style="margin-top:16px;">पासवर्ड</label>
        <input type="password" id="l-pw" data-action="login-key" placeholder="पासवर्ड टाका...">
        <button class="lbtn" id="login-btn" data-action="login">&#x1F510; प्रवेश करा</button>
      </div>
    </div>
  </div>
</div>

<div id="app">
<header>
  <div class="hi">
    <div class="hl">
      <div class="hico"><img src="Saraswati Logo.jpg" style="width:100%;height:100%;object-fit:contain;" onerror="this.style.display='none'"></div>
      <div class="hinfo">
        <div class="htop">समता जोगेश्वरी मंडळाचे</div>
        <div class="hmain">एकनाथ माध्यमिक विद्यालय</div>
      </div>
    </div>
    <div class="hr">
      <span id="sync"></span>
      <div class="ubdg"><span id="uname" style="font-weight:900;">&#x2014;</span></div>
      <button class="sbtn" id="logout-btn" data-action="logout">बाहेर</button>
    </div>
  </div>
</header>
<div id="home-view" style="display:none;">
<main>
  <div class="dhero">
    <div style="font-size:1.8rem;font-weight:900;" id="dash-greeting">स्वागत आहे!</div>
    <div style="font-size:1rem;" id="dash-date"></div>
  </div>
  <div class="modules">
    <div class="mcard" data-action="openmod" data-mod="notice"><div class="micon">📢</div><div class="mtit">सूचना फलक</div></div>
    <div class="mcard" data-action="openmod" data-mod="lib"><div class="micon">&#x1F4D6;</div><div class="mtit">ग्रंथालय</div></div>
    <div class="mcard" data-action="openmod" data-mod="res"><div class="micon">&#x1F4CA;</div><div class="mtit">निकाल</div></div>
    <div class="mcard" data-action="openmod" data-mod="tt"><div class="micon">&#x1F4C5;</div><div class="mtit">वेळापत्रक</div></div>
    <div class="mcard" id="mod-adm" data-action="openmod" data-mod="adm" style="display:none;"><div class="micon">&#x2699;&#xFE0F;</div><div class="mtit">व्यवस्थापन</div></div>
  </div>
</main>
</div>
<div id="mod-view" style="display:none;">
  <nav><div class="ni" id="nav-tabs"></div></nav>
  <main>
    <button class="bbtn no-print" data-action="goback">&#x2190; मुख्यपृष्ठ</button>
    <div id="mod-secs"></div>
  </main>
</div>
</div>
<div id="toast"></div>

<script>
var SURL='https://script.google.com/macros/s/AKfycbyOBWkKwGYS69xLSJ8gkxC03t1UgcqiNfaD7WUg5EGa8zFm4rgKopGJcBzpXfp9eSsqyQ/exec';
var curRole=null,curUser=null,curTc=null,curMod=null,curTab=null;
var PW={super:'samata@2025',mukh:'katemadhav@2025',clerk:'clerk@2025'};
var settings={marksLocked:false};
var CLASSES=[
  {id:'10',label:'10 वी',type:'high'},{id:'9', label:'9 वी', type:'high'},{id:'8', label:'8 वी', type:'mid'},
  {id:'7a',label:'7 वी अ',type:'mid',medium:'Semi-English'},{id:'7b',label:'7 वी ब',type:'mid',medium:'मराठी'},
  {id:'6a',label:'6 वी अ',type:'mid',medium:'Semi-English'},{id:'6b',label:'6 वी ब',type:'mid',medium:'मराठी'},
  {id:'5a',label:'5 वी अ',type:'primary',medium:'Semi-English'},{id:'5b',label:'5 वी ब',type:'primary',medium:'मराठी'},
];
var TEACHERS=[], books=[], transactions=[], students=[], marksData={}, bonafides=[], timetable={}, ttData=[], substitutions=[], notices=[];
var DAYS=['सोमवार','मंगळवार','बुधवार','गुरुवार','शुक्रवार','शनिवार'];
var PERIODS=['1','2','3','4','5','6','7','8'];
var nextBId=1,nextTxId=1,nextSId=1;

var SUBJS={
  primary:['मराठी','हिंदी','इंग्रजी','गणित','विज्ञान','समाजशास्त्र','कला','कार्यानुभव','शा.शिक्षण'],
  mid:['मराठी','हिंदी','इंग्रजी','गणित','विज्ञान','समाजशास्त्र','कला','कार्यानुभव','शा.शिक्षण'],
  high:['मराठी','हिंदी','इंग्रजी','गणित','विज्ञान व तंत्रज्ञान','सामाजिक शास्त्रे','आरोग्य व शा.शि.','स्व विकास व कला','जलसुरक्षा']
};
var EXAM_STRUCT={
  high:[{key:'sa1',label:'SA-1',max:100,group:'Term 1'}, {key:'sa2',label:'SA-2',max:100,group:'Term 2'}],
  mid:[{key:'fa1',label:'FA-1',max:10},{key:'fa2',label:'FA-2',max:10},{key:'sa1',label:'SA-1',max:80},{key:'fa3',label:'FA-3',max:10},{key:'fa4',label:'FA-4',max:10},{key:'sa2',label:'SA-2',max:80}]
};
EXAM_STRUCT.primary=EXAM_STRUCT.mid;

function today(){return new Date().toISOString().split('T')[0];}
function formatDateIndian(s){if(!s)return '';var d=String(s).split('T')[0];var p=d.split('-');if(p.length!==3)return d;return p[0].length===4?p[2]+'-'+p[1]+'-'+p[0]:d;}
function normalizeDate(s){if(!s)return '';var d=String(s).split('T')[0];var p=d.split('-');if(p.length!==3)return d;return p[2].length===4?p[2]+'-'+p[1]+'-'+p[0]:d;}
function fmt(d){if(!d)return'-';var s=String(d).split('T')[0];var p=s.split('-');if(p.length===3&&p[0].length===4)return p[2]+'/'+p[1]+'/'+p[0];return s;}

function parseClass(raw){
  if(!raw)return'';var o=String(raw).trim(), d=o.replace(/[^0-9]/g,'');
  var hasA=o.indexOf('अ')>=0||/a/i.test(o);
  if(d==='10')return'10';if(d==='9')return'9';if(d==='8')return'8';
  if(d==='7')return hasA?'7a':'7b';if(d==='6')return hasA?'6a':'6b';if(d==='5')return hasA?'5a':'5b';
  return d||o.toLowerCase();
}
function grade58(p){if(p>=91)return'अ-1';if(p>=81)return'अ-2';if(p>=71)return'ब-1';if(p>=61)return'ब-2';if(p>=51)return'क-1';if(p>=41)return'क-2';if(p>=33)return'ड';if(p>=21)return'इ-1';return'इ-2';}
function grade910(p){if(p>=75)return'A';if(p>=60)return'B';if(p>=35)return'C';return'D';}
function grade(p,clsId){return getCtype(clsId||'8')==='high'?grade910(p):grade58(p);}
function getCls(id){return CLASSES.find(function(c){return c.id===id;});}
function getCtype(id){var c=getCls(id);return c?c.type:'mid';}
function getSubjs(clsId){return SUBJS[getCtype(clsId)]||SUBJS.mid;}
function getExams(clsId){return EXAM_STRUCT[getCtype(clsId)]||EXAM_STRUCT.mid;}
function getStds(clsId){return students.filter(function(s){return s.cls===clsId&&s.status!=='removed';}).sort(function(a,b){return parseInt(a.roll||0)-parseInt(b.roll||0);});}
function getMk(sId,cls,subj,exam){var k=cls+'|'+subj+'|'+exam;return (marksData[k]&&marksData[k][sId])?marksData[k][sId]:'';}
function setMk(sId,cls,subj,exam,val){var k=cls+'|'+subj+'|'+exam;if(!marksData[k])marksData[k]={};marksData[k][sId]=val;}
function calcSubjTotal(sId,cls,subj){var exams=getExams(cls);var total=0,max=0,hasAny=false;exams.forEach(function(e){var v=getMk(sId,cls,subj,e.key);if(v!==''){hasAny=true;total+=parseFloat(v)||0;}max+=e.max;});if(!hasAny)return{total:'',max:max,pct:0};return{total:Math.round(total*10)/10,max:max,pct:max>0?Math.round(total/max*100):0};}
function calcStudentTotal(sId,clsId){var subjs=getSubjs(clsId);var total=0,max=0,hasAny=false;subjs.forEach(function(subj){var r=calcSubjTotal(sId,clsId,subj);if(r.total!==''){hasAny=true;total+=parseFloat(r.total)||0;}max+=r.max;});if(!hasAny)return{total:0,max:max,pct:0,hasData:false};return{total:Math.round(total*10)/10,max:max,pct:max>0?Math.round(total/max*100):0,hasData:true};}

var _toast=null;
function toast(msg,t){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+(t||'ok');if(_toast)clearTimeout(_toast);_toast=setTimeout(function(){el.className='';},3000);}
function openM(id){document.getElementById(id).classList.add('op');}
function closeM(id){document.getElementById(id).classList.remove('op');}
function syncStatus(s){var el=document.getElementById('sync');if(!el)return;if(s==='ok'){el.textContent='☁️ Saved';el.style.color='#23A058';}else if(s==='ing'){el.textContent='⏳...';el.style.color='#F57F17';}else{el.textContent='📵 Offline';el.style.color='var(--r)';}}
function getMyTTName(tc){if(!tc)return '';return(tc.ttName||tc.name).trim();}

// ---- LOGIN ----
function onRole(){
  var r=document.getElementById('l-role').value;
  var ts=document.getElementById('tc-sel'), as=document.getElementById('admin-sel');
  if(ts) ts.style.display=r==='shik'?'block':'none';
  if(as) as.style.display=r==='admin'?'block':'none';
  if(r==='shik'){
    var sel=document.getElementById('l-tc');
    sel.innerHTML='<option value="">— निवड —</option>';
    TEACHERS.filter(function(t){return !t.isMukh;}).forEach(function(t){
      var o=document.createElement('option');o.value=t.id;o.textContent=t.name;sel.appendChild(o);
    });
  }
}
function doLogin(){
  var rType=document.getElementById('l-role').value, pw=document.getElementById('l-pw').value;
  if(!rType){toast('भूमिका निवडा!','err');return;}
  if(rType==='admin'){
     var r=document.getElementById('l-admin-role').value;
     if(!r){toast('प्रशासकीय पद निवडा!','err');return;}
     if(r==='super'){if(pw!==PW.super){loginErr('पासवर्ड चुकीचा!');return;}curRole='super';curUser='संस्थाचालक';curTc=null;}
     else if(r==='mukh'){if(pw!==PW.mukh){loginErr('पासवर्ड चुकीचा!');return;}curRole='mukh';curUser='मुख्याध्यापक';curTc=null;}
     else if(r==='clerk'){if(pw!==PW.clerk){loginErr('पासवर्ड चुकीचा!');return;}curRole='clerk';curUser='लिपिक';curTc=null;}
  } else if(rType==='shik'){
     var tid=parseInt(document.getElementById('l-tc').value)||0;
     if(!tid){loginErr('शिक्षक निवडा!');return;}
     var tc=TEACHERS.find(function(t){return t.id===tid;});
     if(!tc||pw!==tc.pw){loginErr('पासवर्ड चुकीचा!');return;}
     curRole='shik';curUser=tc.name;curTc=tc;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uname').textContent=curUser;
  showHome(); loadShikshakFirst();
}
function loginErr(msg){var p=document.getElementById('l-pw');p.style.borderColor='var(--r)';p.value='';p.placeholder=msg;setTimeout(function(){p.style.borderColor='';p.placeholder='पासवर्ड टाका...';},2500);}
function doLogout(){curRole=null;curUser=null;curTc=null;curMod=null;document.getElementById('login-screen').style.display='flex';document.getElementById('app').style.display='none';document.getElementById('l-pw').value='';}

function showHome(){document.getElementById('home-view').style.display='block';document.getElementById('mod-view').style.display='none';curMod=null;var admCard=document.getElementById('mod-adm');if(admCard)admCard.style.display=(curRole==='super'||curRole==='mukh'||curRole==='clerk')?'block':'none';document.getElementById('dash-date').innerHTML='आजची तारीख: '+formatDateIndian(today());}
function openMod(mod){curMod=mod;document.getElementById('home-view').style.display='none';document.getElementById('mod-view').style.display='block';buildTabs();}

function buildTabs(){
  var isA=(curRole==='super'||curRole==='mukh');
  var tabs=curMod==='adm'?[
    {id:'astd',l:'विद्यार्थी',h:(curRole==='clerk')},{id:'atch',l:'शिक्षक',h:(curRole==='clerk')},
    {id:'apw',l:'पासवर्ड',h:(curRole==='clerk')},{id:'alck',l:'गुण Lock',h:(curRole==='clerk')},
    {id:'abona',l:'बोनाफाईड'},{id:'apro',l:'प्रमोट',h:curRole!=='super'}
  ]:curMod==='lib'?[
    {id:'li',l:'पुस्तक द्या'},{id:'lr',l:'परत घ्या'},{id:'lc',l:'ग्रंथसूची'}
  ]:curMod==='notice'?[
    {id:'ntview',l:'सूचना'},{id:'ntadd',l:'नवीन सूचना',h:!isA}
  ]:curMod==='tt'?[
    {id:'ttcls',l:'वर्गनिहाय',h:!(curRole==='super'||curRole==='mukh')},{id:'tttc',l:'शिक्षकनिहाय'},
    {id:'ttsub',l:'समायोजन',h:!(curRole==='super'||curRole==='mukh')},{id:'ttadm',l:'संपादन',h:!(curRole==='super'||curRole==='mukh')}
  ]:curMod==='res'?[
    {id:'rm',l:'गुण नोंदणी',h:(curRole==='clerk')},{id:'rbook',l:'निकालपत्रक',h:(!isA && curRole!=='clerk')},
    {id:'rgos',l:'गोषवारा',h:(!isA && curRole!=='clerk')},{id:'rprog',l:'श्रेणी पत्रक'},
    {id:'rcard',l:'प्रगतिपत्रक',h:!(curRole==='super'||curRole==='mukh'||curRole==='clerk'||(curRole==='shik'&&curTc&&curTc.classOf))}
  ]:[];
  var nav=document.getElementById('nav-tabs');nav.innerHTML='';var first=null;
  tabs.forEach(function(tb){if(tb.h)return;if(!first)first=tb.id;var d=document.createElement('div');d.className='tab';d.id='tab-'+tb.id;d.innerHTML=tb.l;d.setAttribute('data-action','showtab');d.setAttribute('data-tabid',tb.id);nav.appendChild(d);});
  if(first)showTab(first);
}
function showTab(id){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  var tb=document.getElementById('tab-'+id);if(tb)tb.classList.add('on');curTab=id;
  renderSec(id);
}
function renderSec(id){
  var el=document.getElementById('mod-secs');if(!el)return;
  var html='';
  try {
    if(id==='li')html=secLI();else if(id==='lr')html=secLR();else if(id==='lc')html=secLC();
    else if(id==='rm')html=secRM();else if(id==='rcard')html=secRCard();else if(id==='rbook')html=secRBook();else if(id==='rgos')html=secRGos();else if(id==='rprog')html=secRProg();
    else if(id==='astd')html=secRStd();else if(id==='atch')html=secRTch();else if(id==='apw')html=secAPw();else if(id==='abona')html=secABona();else if(id==='apro')html=secAPro();else if(id==='alck')html=secRAdm();
    else if(id==='ttcls')html=secTTCls();else if(id==='tttc')html=secTTTc();else if(id==='ttsub')html=secTTSub();else if(id==='ttadm')html=secTTAdm();
    else if(id==='ntview')html=secNtView();else if(id==='ntadd')html=secNtAdd();
  } catch(e) {
    html='<div class="alert aw">Error: '+e.message+'</div>';
  }
  el.innerHTML=html;
  if(id==='ttcls')renderTTCls();
  if(id==='tttc')renderTTTc();
  if(id==='ttsub')renderTTSub();
  if(id==='ttadm')renderTTAdm();
}

function genCard(){
  var cls=(document.getElementById('pc-cls')||{}).value,sId=parseInt((document.getElementById('pc-std')||{}).value);
  if(!cls||!sId){toast('निवड करा!','err');return;}
  var s=students.find(function(x){return x.id===sId;}),c=getCls(cls),subjs=getSubjs(cls),ct=getCtype(cls);
  var isHigh = (ct==='high');
  
  var coreSubjs = subjs.slice(0, 6);
  var gradedSubjs = subjs.slice(6);
  if(gradedSubjs.length===0) gradedSubjs=['आरोग्य व शा.शि.','स्व विकास व कला','जलसुरक्षा'];
  
  var markRows = '';
  var gTot = 0, gMax = 0;
  var codes = ['1', '15', '17', '27', '71', '72', '73', '91'];
  var maxRows = Math.max(coreSubjs.length, gradedSubjs.length);

  for(var i=0; i<maxRows; i++){
      var cs = coreSubjs[i] || '';
      var gs = gradedSubjs[i] || '';
      var code = cs ? codes[i%codes.length] : '';
      var cMax = '', cObt = '';
      if(cs){
          var t = calcSubjTotal(sId, cls, cs);
          cMax = isHigh ? 100 : (t.max || 100); 
          cObt = t.total !== '' ? t.total : 'AB';
          if(t.total !== ''){ gTot += parseFloat(t.total)||0; gMax += cMax; }
      }
      var gGr = '';
      if(gs){
          var gt = calcSubjTotal(sId, cls, gs);
          gGr = gt.total !== '' ? grade(gt.pct, cls) : 'अ'; 
      }
      
      markRows += '<tr>'+
          '<td style="border:1px solid #000; padding:6px; font-weight:bold; text-align:center;">'+code+'</td>'+

          '</div>'+
      '</div>'+

      '<div style="display:flex; justify-content:space-between; font-weight:bold; background:#e2e8f0; padding:6px 15px; border: 1px solid #000; margin-bottom: 15px;">'+

// ---- ADMIN & TEACHERS ----
function secRStd(){if(curRole!=='super'&&curRole!=='mukh')return noAccess();var clsOpts=CLASSES.map(function(c){return '<option value="'+c.id+'">'+c.label+'</option>';}).join('');var rows=students.filter(function(s){return s.status!=='removed';}).map(function(s){return '<tr><td>'+s.roll+'</td><td>'+s.name+'</td><td>'+s.cls+'</td><td><button class="btn bd bsm" data-action="removestd" data-sid="'+s.id+'">काढा</button></td></tr>';}).join('');return '<div class="card"><div class="ct">विद्यार्थी</div><div class="fg2"><input type="text" id="st-n" placeholder="नाव"><select id="st-c"><option value=""></option>'+clsOpts+'</select><button class="btn bs" data-action="addstudent">दाखल</button></div><div class="tw"><table><thead><tr><th>ह.क्र.</th><th>नाव</th><th>वर्ग</th><th>कृती</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function addStudent(){var n=document.getElementById('st-n').value,c=document.getElementById('st-c').value;if(!n)return;students.push({id:nextSId++,name:n,cls:c,roll:'',status:'active',reason:''});toast('दाखल!');syncAll();showTab('astd');}
function removeStd(id){students.find(function(s){return s.id===id;}).status='removed';toast('काढले!');syncAll();showTab('astd');}

function secRTch(){if(curRole!=='super'&&curRole!=='mukh')return noAccess();var rows=TEACHERS.map(function(t){return '<tr><td>'+t.name+'</td><td>'+t.classOf+'</td><td>'+t.subjects.join(',')+'</td></tr>';}).join('');return '<div class="card"><div class="ct">शिक्षक</div><div class="tw"><table><thead><tr><th>नाव</th><th>वर्गशिक्षक</th><th>विषय</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function secAPw(){if(curRole!=='super'&&curRole!=='mukh')return noAccess();var rows=TEACHERS.map(function(t){return '<tr><td>'+t.name+'</td><td>'+t.pw+'</td><td><button class="btn bo bsm" onclick="changeTcPw('+t.id+')">बदला</button></td></tr>';}).join('');return '<div class="card"><div class="ct">पासवर्ड</div><div class="tw"><table><thead><tr><th>नाव</th><th>पासवर्ड</th><th>कृती</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';}
function changeTcPw(id){var np=prompt('पासवर्ड:');if(np){TEACHERS.find(function(t){return t.id===id;}).pw=np;toast('बदलला!');syncAll();showTab('apw');}}
function secAPro(){if(curRole!=='super')return noAccess();return '<div class="card"><div class="ct">प्रमोट</div><button class="btn bgold" data-action="promoteall">सर्व प्रमोट करा</button></div>';}
function promoteAll(){if(!confirm('प्रमोट?'))return;students.forEach(function(s){if(s.cls==='9')s.cls='10';else if(s.cls==='8')s.cls='9';});toast('प्रमोट!');syncAll();}
function secRAdm(){return '<div class="card"><div class="ct">सेटिंग</div><label><input type="checkbox" '+(settings.marksLocked?'checked':'')+' data-action="toggleLock"> गुण नोंदणी लॉक</label></div>';}

// ---- TIMETABLE ----
function secTTCls(){var clsOpts=CLASSES.map(function(c){return '<option value="'+c.id+'">'+c.label+'</option>';}).join('');return '<div class="card"><div class="ct">वर्ग वेळापत्रक</div><select id="tt-cls-sel" onchange="renderTTCls()"><option value=""></option>'+clsOpts+'</select><div id="tt-cls-wrap"></div></div>';}
function renderTTCls(){var cls=document.getElementById('tt-cls-sel').value;var wrap=document.getElementById('tt-cls-wrap');if(!cls){wrap.innerHTML='';return;}var hdr='<div class="tt-hdr">दिवस</div>'+PERIODS.map(function(p){return '<div class="tt-hdr">तास '+p+'</div>';}).join('');var body=DAYS.map(function(day){var cells=PERIODS.map(function(p){var sl=(timetable[cls]&&timetable[cls][day])?timetable[cls][day][p]:null;return '<div class="tt-cell">'+(sl?sl.tcName+'<br>'+sl.subj:'')+'</div>';}).join('');return '<div class="tt-cell"><strong>'+day+'</strong></div>'+cells;}).join('');wrap.innerHTML='<div class="tt-grid" style="grid-template-columns:100px repeat(8,1fr);">'+hdr+body+'</div>';}
function secTTTc(){var tcOpts=TEACHERS.map(function(t){return '<option value="'+t.id+'">'+t.name+'</option>';}).join('');return '<div class="card"><div class="ct">शिक्षक वेळापत्रक</div><select id="tt-tc-sel" onchange="renderTTTc()"><option value=""></option>'+tcOpts+'</select><div id="tt-tc-wrap"></div></div>';}
function renderTTTc(){var tcId=parseInt(document.getElementById('tt-tc-sel').value);var wrap=document.getElementById('tt-tc-wrap');if(!tcId){wrap.innerHTML='';return;}var tc=TEACHERS.find(function(t){return t.id===tcId;});var myName=getMyTTName(tc);var hdr='<div class="tt-hdr">दिवस</div>'+PERIODS.map(function(p){return '<div class="tt-hdr">तास '+p+'</div>';}).join('');var body=DAYS.map(function(day){var cells=PERIODS.map(function(p){var slot=ttData.find(function(s){return s.day===day&&s.period===p&&s.teacher===myName;});return '<div class="tt-cell">'+(slot?slot.cls+'<br>'+slot.subject:'')+'</div>';}).join('');return '<div class="tt-cell"><strong>'+day+'</strong></div>'+cells;}).join('');wrap.innerHTML='<div class="tt-grid" style="grid-template-columns:100px repeat(8,1fr);">'+hdr+body+'</div>';}
function secTTSub(){return '<div class="card"><div class="ct">समायोजन</div><div class="alert ai">सध्या उपलब्ध नाही</div></div>';}
function secTTAdm(){return '<div class="card"><div class="ct">संपादन</div><div class="alert ai">सध्या उपलब्ध नाही</div></div>';}

// ---- GOOGLE SCRIPT SYNC & LOAD ----
function sheetPost(name,rows,cb){var xhr=new XMLHttpRequest();xhr.open('POST',SURL,true);xhr.setRequestHeader('Content-Type','text/plain');xhr.onreadystatechange=function(){if(xhr.readyState===4){if(cb)cb();}};xhr.send(JSON.stringify({action:'write',sheet:name,rows:rows}));}
function sheetGet(name,cb){var xhr=new XMLHttpRequest();xhr.open('GET',SURL+'?sheet='+encodeURIComponent(name),true);xhr.onreadystatechange=function(){if(xhr.readyState===4){try{cb(JSON.parse(xhr.responseText).rows||[]);}catch(e){cb([]);}}};xhr.send();}

function syncAll(){
  syncStatus('ing');
  var sR=[['ID','Name','Class','Roll','Status','Reason','Father','Mother','DOB','Phone','RegNo']];
  students.forEach(function(s){sR.push([s.id,s.name,s.cls,s.roll,s.status,s.reason,'',s.mother,s.dob,'',s.regNo]);});
  sheetPost('vidyarthi',sR,function(){syncStatus('ok');});
}

function syncMks(cls,subj){
  syncStatus('ing');var exams=getExams(cls);var rows=[['sId','cls','subj'].concat(exams.map(function(e){return e.key;}))];
  getStds(cls).forEach(function(s){var row=[s.id,cls,subj];exams.forEach(function(e){row.push(getMk(s.id,cls,subj,e.key));});rows.push(row);});
  sheetPost('marks_'+cls+'_'+subj.replace(/\s+/g,'_'),rows,function(){syncStatus('ok');});
}

function loadShikshakFirst(){
  sheetGet('Shikshak',function(rows){
    if(rows.length>1){
      TEACHERS=rows.slice(1).filter(function(r){return r[0];}).map(function(r){return{id:parseInt(r[0]),name:r[1],pw:r[2],classOf:r[3]||'',subjects:String(r[4]||'').split('|').filter(Boolean),classes:String(r[5]||'').split('|').filter(Boolean),isMukh:!r[3]&&!r[4],ttName:r[6]||r[1]};});
    }
    loadAll();
  });
}

function loadAll(){
  syncStatus('ing');
  sheetGet('vidyarthi',function(sR){
    if(sR.length>1){
      var h=sR[0].join('');var isKishor=h.indexOf('इयत्ता')>=0;
      var idC=1;students=[];
      sR.slice(1).forEach(function(r){
        if(!r||r.join('').trim()==='')return;
        if(isKishor){
          if(r[2])students.push({id:idC++,name:String(r[2]).trim(),cls:parseClass(r[0]),roll:String(r[1]||'').trim(),status:'active',mother:String(r[3]||'').trim(),dob:String(r[5]||'').trim(),regNo:String(r[6]||'').trim()});
        }else{
          if(r[1])students.push({id:parseInt(r[0])||idC++,name:String(r[1]).trim(),cls:parseClass(r[2]),roll:String(r[3]||'').trim(),status:String(r[4]||'active'),mother:String(r[7]||'').trim(),dob:String(r[8]||'').trim(),regNo:String(r[10]||'').trim()});
        }
      });
      nextSId=students.length+1;
    }
    sheetGet('TIMETABLE',function(ttR){
      timetable={};ttData=[];
      if(ttR.length>1)ttR.slice(1).forEach(function(r){
        var day=r[0],cls=parseClass(r[1]),p=r[2],subj=r[3],tcName=r[4];
        if(!day||!cls||!p)return;
        if(!timetable[cls])timetable[cls]={};
        if(!timetable[cls][day])timetable[cls][day]={};
        var tc=TEACHERS.find(function(t){return t.name===tcName||t.ttName===tcName;});
        timetable[cls][day][p]={tcId:tc?tc.id:0,tcName:tcName,subj:subj};
        ttData.push({day:day,cls:cls,period:p,subject:subj,teacher:tcName});
      });
      syncStatus('ok');toast('डेटा लोड झाला! ✅');
      if(curTab)showTab(curTab);
    });
  });
}

document.addEventListener('DOMContentLoaded',function(){
  document.addEventListener('keydown',function(e){if(e.key==='Enter'&&(e.target.id==='l-pw'))doLogin();});
  document.addEventListener('change',function(e){
    var id=e.target.id,a=e.target.getAttribute('data-action');
    if(id==='l-role')onRole();
    else if(a==='toggleLock'){settings.marksLocked=e.target.checked;toast('सेटिंग बदलली!');}
  });
  document.addEventListener('click',function(e){
    var el=e.target.closest('[data-action]');if(!el)return;
    var a=el.getAttribute('data-action');
    if(a==='login')doLogin();else if(a==='logout')doLogout();
    else if(a==='goback'){curMod=null;showHome();}
    else if(a==='closemodal')closeM('cm');
    else if(a==='openmod')openMod(el.getAttribute('data-mod'));
    else if(a==='showtab')showTab(el.getAttribute('data-tabid'));
    else if(a==='issuebook')issuebook();
    else if(a==='returnbook')returnbook(parseInt(el.getAttribute('data-txid')));
    else if(a==='addstudent')addStudent();
    else if(a==='removestd')removeStd(parseInt(el.getAttribute('data-sid')));
    else if(a==='gencard')genCard();else if(a==='printbona')printBona();
  });
});
</script>
