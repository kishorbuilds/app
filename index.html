<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMVE School App</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #1abc9c;
            --bg-color: #f4f7f6;
            --text-dark: #333;
            --text-light: #fff;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-dark); }
        
        /* Header & Nav */
        header { background: var(--primary); color: var(--text-light); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { font-size: 0.9em; }
        nav { display: flex; gap: 10px; background: #34495e; padding: 10px 20px; flex-wrap: wrap; }
        nav button { background: none; border: none; color: var(--text-light); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 1em; }
        nav button:hover, nav button.active { background: var(--secondary); }
        
        /* Containers */
        .container { max-width: 1200px; margin: 20px auto; padding: 20px; background: var(--text-light); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        .hidden { display: none !important; }
        
        /* Cards & Forms */
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .card h3 { margin-bottom: 15px; border-bottom: 2px solid var(--secondary); padding-bottom: 5px; display: inline-block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { padding: 8px; width: 100%; max-width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { background: var(--secondary); color: var(--text-light); border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn:hover { filter: brightness(0.9); }
        .btn-danger { background: var(--danger); }
        
        /* Tables */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }
        .marks-input { width: 60px; text-align: center; }

        /* Login Screen */
        #login-screen { max-width: 400px; margin: 100px auto; text-align: center; }
        #login-screen h2 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>EMVE School App - लॉगीन</h2>
        <div class="form-group">
            <input type="text" id="username" placeholder="युजरनेम (Username)" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="पासवर्ड (Password)" required>
        </div>
        <button class="btn" onclick="appLogin()">लॉगीन करा</button>
        <p style="margin-top:15px; font-size:0.8em; color:gray;">(Demo: admin / teacher / class_teacher)</p>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <h2>EMVE School App</h2>
            <div class="user-info">
                <span id="user-display"></span> | 
                <button class="btn btn-danger" style="padding: 4px 8px;" onclick="appLogout()">लॉगआउट</button>
            </div>
        </header>

        <nav id="main-nav">
            </nav>

        <div class="container">
            
            <section id="module-library" class="hidden tab-content">
                <div class="card">
                    <h3>ग्रंथालय व्यवस्थापन</h3>
                    <button class="btn" onclick="alert('पुस्तक देण्याची प्रक्रिया (Issue)')">पुस्तक द्या</button>
                    <button class="btn" onclick="alert('पुस्तक जमा करण्याची प्रक्रिया (Return)')">पुस्तक परत घ्या</button>
                    <button class="btn" onclick="alert('ग्रंथसूची (Book Catalog)')">ग्रंथसूची</button>
                    <button class="btn" onclick="alert('अहवाल (Reports)')">अहवाल</button>
                </div>
            </section>

            <section id="module-results" class="hidden tab-content">
                <div class="card" id="marks-entry-section">
                    <h3>गुण नोंदणी (Marks Entry)</h3>
                    <div class="form-group">
                        <label>वर्ग निवडा:</label>
                        <select id="class-selector" onchange="renderMarksTable()">
                            <option value="">-- वर्ग निवडा --</option>
                            <option value="5 वी">5 वी</option>
                            <option value="7 वी">7 वी</option>
                            <option value="9 वी">9 वी</option>
                            <option value="10 वी">10 वी</option>
                        </select>
                    </div>
                    <div id="marks-table-container"></div>
                </div>

                <div class="card" id="reports-section">
                    <h3>अहवाल (Reports)</h3>
                    <button class="btn" onclick="alert('निकालपत्रक जनरेट होत आहे...')">निकालपत्रक</button>
                    <button class="btn" onclick="alert('गोषवारा श्रेणी जनरेट होत आहे...')">गोषवारा श्रेणी</button>
                    <button class="btn" onclick="alert('गोषवारा जातनिहाय जनरेट होत आहे...')">गोषवारा जातनिहाय</button>
                    <button class="btn" onclick="alert('श्रेणी पत्रक डाऊनलोड...')">श्रेणी पत्रक</button>
                    <button class="btn" onclick="alert('प्रगतीपत्रक डाऊनलोड...')">प्रगतीपत्रक</button>
                </div>
            </section>

            <section id="module-management" class="hidden tab-content">
                <div class="card">
                    <h3>संस्थाचालक / मुख्याध्यापक व्यवस्थापन</h3>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                        <button class="btn" onclick="alert('विद्यार्थी जोडण्याची पद्धत')">विद्यार्थी जोडा/काढा</button>
                        <button class="btn" onclick="alert('शिक्षक जोडण्याची पद्धत')">शिक्षक जोडा/काढा</button>
                        <button class="btn" onclick="alert('पासवर्ड बदलण्याची सोय')">पासवर्ड व्यवस्थापन</button>
                        <button class="btn" onclick="alert('सर्व गुण Lock झाले आहेत.')">गुण Lock करा</button>
                        <button class="btn" onclick="alert('पुढील वर्गात प्रमोट केले.')">प्रमोट (Promote)</button>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script>
        // --- 1. Constants & State ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzDPkJF7VI53PYTE4T1PmAAlU4jFtzTN1zjRi8V9Wz1-SsQySly6NNfpO1-gmMc4SbOdA/exec';
        let currentUser = null;

        // --- 2. Utility Functions ---
        // Parse Class: Extracts digits from "10 वी", "9 वी" etc.
        function parseClass(className) {
            if (!className) return 0;
            return parseInt(className.replace(/\D/g, ''), 10) || 0;
        }

        // Generic API fetch simulation (Replace alert with real fetch)
        async function fetchAppsScript(action, data = {}) {
            console.log(`Calling App Script: Action=${action}`, data);
            // Real implementation:
            /*
            let url = new URL(SCRIPT_URL);
            url.searchParams.append('action', action);
            Object.keys(data).forEach(key => url.searchParams.append(key, data[key]));
            let response = await fetch(url);
            return await response.json();
            */
        }

        // --- 3. Authentication ---
        function appLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            
            // Mock Login Logic based on Summary
            if (user === 'admin') {
                currentUser = { name: "माधव काटे", role: "admin", label: "मुख्याध्यापक" };
            } else if (user === 'class_teacher') {
                currentUser = { name: "शिक्षक १", role: "class_teacher", label: "वर्गशिक्षक", assignedClass: "10 वी" };
            } else if (user === 'teacher') {
                currentUser = { name: "शिक्षक २", role: "subject_teacher", label: "विषय शिक्षक", assignedClass: "9 वी" };
            } else {
                alert("चुकीचे युजरनेम!");
                return;
            }

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-display').innerText = `${currentUser.name} (${currentUser.label})`;
            
            buildNavigation();
        }

        function appLogout() {
            currentUser = null;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // --- 4. Navigation & Roles ---
        function buildNavigation() {
            const nav = document.getElementById('main-nav');
            nav.innerHTML = ''; // Clear existing

            // Everyone sees Library & Results
            nav.innerHTML += `<button onclick="switchTab('module-library', this)">ग्रंथालय</button>`;
            nav.innerHTML += `<button onclick="switchTab('module-results', this)">निकाल</button>`;

            // Only Admin sees Management
            if (currentUser.role === 'admin') {
                nav.innerHTML += `<button onclick="switchTab('module-management', this)">व्यवस्थापन</button>`;
            }

            // Role based UI setup inside Results Tab
            const reportsSec = document.getElementById('reports-section');
            if (currentUser.role === 'subject_teacher') {
                reportsSec.style.display = 'none'; // Subject teachers don't see consolidated reports
            } else {
                reportsSec.style.display = 'block'; // Class teachers & Admins see reports
            }

            // Default click first tab
            nav.children[0].click();
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            
            document.querySelectorAll('#main-nav button').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        }

        // --- 5. Result Module (Dynamic Marking System) ---
        function renderMarksTable() {
            const cls = document.getElementById('class-selector').value;
            const container = document.getElementById('marks-table-container');
            if (!cls) { container.innerHTML = ''; return; }

            const classNumber = parseClass(cls);
            let html = `<h4>${cls} साठी गुण नोंदणी तक्ता</h4>`;
            html += `<table><thead><tr>`;
            html += `<th>ह.क्र.</th><th>विद्यार्थ्याचे नाव</th>`;

            // Logic: 5th-8th Formative/Summative, 9th-10th Written/Internal
            if (classNumber <= 8) {
                html += `<th>आकारिक (Formative)</th><th>संकलित (Summative)</th><th>एकूण</th>`;
            } else {
                html += `<th>लेखी (Written - 80)</th><th>अंतर्गत (Internal - 20)</th><th>एकूण</th>`;
            }
            html += `<th>कृती</th></tr></thead><tbody>`;

            // Dummy Data Row
            const dummyStudents = [
                { roll: 1, name: "समीर देशमुख" },
                { roll: 2, name: "अमर पाटील" }
            ];

            dummyStudents.forEach(stu => {
                html += `<tr>
                    <td>${stu.roll}</td>
                    <td>${stu.name}</td>
                    <td><input type="number" class="marks-input" max="100"></td>
                    <td><input type="number" class="marks-input" max="100"></td>
                    <td><strong>-</strong></td>
                    <td><button class="btn" style="padding:4px 8px;">Save</button></td>
                </tr>`;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

    </script>
</body>
</html>
